<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MODEL WORLD - Quản lý người dùng</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0c1525;
    color: #e1e7ff;
}

.table td, .table th {
    vertical-align: middle;
}

.preview-img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">Quản lý người dùng</h2>

    <div th:if="${param.success}" class="alert alert-success">
        Cập nhật thành công!
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Có lỗi xảy ra!
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-bordered table-hover text-center align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Avatar</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Giới tính</th>
                <th>Vai trò</th>
                <th>Điện thoại</th>
                <th>Ngày sinh</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="acc : ${accounts}">
                <td th:text="${acc.id}"></td>

                <td>
                    <img th:src="@{${acc.avatar != null ? acc.avatar : '/images/user-default.png'}}"
                         class="preview-img">
                </td>

                <td th:text="${acc.fullName}"></td>
                <td th:text="${acc.email}"></td>

                <td>
                    <span th:if="${acc.gender == true}">Nam</span>
                    <span th:if="${acc.gender == false}">Nữ</span>
                </td>

                <td>
                    <span th:text="${acc.role ? 'Admin' : 'User'}"
                          th:classappend="${acc.role} ? 'badge bg-warning text-dark' : 'badge bg-secondary'">
                    </span>
                </td>

                <td th:text="${acc.phone}"></td>

                <td th:text="${#temporals.format(acc.birthDay, 'dd/MM/yyyy')}"></td>

                <td>
                    <span th:text="${acc.active ? 'Hoạt động' : 'Đã khóa'}"
                          th:classappend="${acc.active} ? 'badge bg-success' : 'badge bg-danger'">
                    </span>
                </td>

                <td>
                    <!-- EDIT -->
                    <button class="btn btn-sm btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#editModal"
                            th:attr="
                                data-id=${acc.id},
                                data-fullname=${acc.fullName},
                                data-phone=${acc.phone},
                                data-email=${acc.email},
                                data-avatar=${acc.avatar},
                                data-gender=${acc.gender},
                                data-role=${acc.role},
                                data-birthday=${acc.birthDay}">
                        Sửa
                    </button>

                    <!-- LOCK -->
                    <a th:if="${!acc.role and acc.active}"
                       th:href="@{'/user-mana/lock/' + ${acc.id}}"
                       class="btn btn-sm btn-danger">
                        Khóa
                    </a>

                    <!-- UNLOCK -->
                    <a th:if="${!acc.role and !acc.active}"
                       th:href="@{'/user-mana/unlock/' + ${acc.id}}"
                       class="btn btn-sm btn-success">
                        Mở
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>


<!-- ================= MODAL EDIT ================= -->

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Cập nhật thông tin</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="editForm" method="post" enctype="multipart/form-data">
                <div class="modal-body">

                    <input type="hidden" id="userId" name="id">

                    <div class="row">
                        <div class="col-md-6">

                            <div class="mb-3">
                                <label>Họ và tên</label>
                                <input type="text" id="fullName" name="fullName"
                                       class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" name="email"
                                       class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label>Điện thoại</label>
                                <input type="text" id="phone" name="phone"
                                       class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label>Ngày sinh</label>
                                <input type="date" id="birthDay" name="birthDay"
                                       class="form-control" required>
                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="mb-3">
                                <label>Giới tính</label><br>
                                <input type="radio" name="gender" value="true" id="genderMale">
                                <label for="genderMale">Nam</label>

                                <input type="radio" name="gender" value="false" id="genderFemale">
                                <label for="genderFemale">Nữ</label>
                            </div>

                            <div class="mb-3">
                                <label>Vai trò</label><br>
                                <input type="radio" name="role" value="false" id="roleUser">
                                <label for="roleUser">User</label>

                                <input type="radio" name="role" value="true" id="roleAdmin">
                                <label for="roleAdmin">Admin</label>
                            </div>

                            <div class="mb-3">
                                <label>Avatar</label>
                                <input type="file" name="file" id="photoFile"
                                       class="form-control" accept="image/*">

                                <img id="photoPreview"
                                     src="/images/user-default.png"
                                     class="preview-img mt-2">
                            </div>

                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">Hủy</button>

                    <button type="submit"
                            class="btn btn-primary">Lưu</button>
                </div>
            </form>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const editModal = document.getElementById('editModal');

    editModal.addEventListener('show.bs.modal', event => {

        const button = event.relatedTarget;

        const id = button.getAttribute('data-id');
        const fullName = button.getAttribute('data-fullname');
        const phone = button.getAttribute('data-phone');
        const email = button.getAttribute('data-email');
        const avatar = button.getAttribute('data-avatar');
        const birthDay = button.getAttribute('data-birthday');
        const gender = button.getAttribute('data-gender');
        const role = button.getAttribute('data-role');

        document.getElementById('editForm').action = '/user-mana/update/' + id;
        document.getElementById('userId').value = id;
        document.getElementById('fullName').value = fullName || '';
        document.getElementById('phone').value = phone || '';
        document.getElementById('email').value = email || '';
        document.getElementById('birthDay').value = birthDay || '';

        if (gender === 'true') {
            document.getElementById('genderMale').checked = true;
        } else {
            document.getElementById('genderFemale').checked = true;
        }

        if (role === 'true') {
            document.getElementById('roleAdmin').checked = true;
        } else {
            document.getElementById('roleUser').checked = true;
        }

        const preview = document.getElementById('photoPreview');
        if (avatar && avatar !== 'null') {
            preview.src = avatar;
        } else {
            preview.src = '/images/user-default.png';
        }
    });

    document.getElementById('photoFile').addEventListener('change', event => {
        const [file] = event.target.files;
        if (file) {
            document.getElementById('photoPreview').src =
                URL.createObjectURL(file);
        }
    });

});
</script>

</body>
</html>
