<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý Sản phẩm - MODEL WORLD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --sidebar-width:260px;
    --bg-body:#f8fafc;
    --bg-sidebar:#1e293b;
    --bg-card:#ffffff;
    --border-color:#e2e8f0;
    --text-main:#1e293b;
    --text-muted:#64748b;
    --primary:#2563eb;
    --success:#16a34a;
    --danger:#dc2626;
}

*{box-sizing:border-box;}

body{
    margin:0;
    background:var(--bg-body);
    color:var(--text-main);
    font-family:'Be Vietnam Pro',sans-serif;
    overflow-x:hidden;
}

/* Layout */
#wrapper{
    display:flex;
    min-height:100vh;
}

#sidebar-wrapper{
    width:var(--sidebar-width);
    background:var(--bg-sidebar);
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    color:white;
    z-index:1000;
}

#page-content-wrapper{
    margin-left:var(--sidebar-width);
    width:calc(100% - var(--sidebar-width));
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

body.toggled #sidebar-wrapper{
    transform:translateX(-100%);
    transition:.3s;
}

body.toggled #page-content-wrapper{
    margin-left:0;
    width:100%;
    transition:.3s;
}

/* Sidebar */
.sidebar-heading{
    padding:22px;
    text-align:center;
    font-size:20px;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.list-group-item{
    background:transparent;
    color:#cbd5e1;
    border:none;
    padding:14px 20px;
    font-weight:500;
}

.list-group-item:hover,
.list-group-item.active{
    background:#334155;
    color:white;
}

.list-group-item i{
    margin-right:10px;
}

/* Navbar */
.top-navbar{
    background:white;
    border-bottom:1px solid var(--border-color);
    padding:16px 28px;
}

.btn-toggle{
    border:1px solid var(--border-color);
    background:white;
}

/* Cards */
.table-container{
    background:white;
    border-radius:12px;
    border:1px solid var(--border-color);
    padding:24px;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

/* Table */
.table thead th{
    background:#f1f5f9;
    color:var(--text-muted);
    font-size:13px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border-color);
    white-space:nowrap;
}

.table td{
    vertical-align:middle;
    border-color:var(--border-color);
}

/* Form */
.form-control-custom,
.form-select-custom{
    border:1px solid var(--border-color);
    border-radius:8px;
    min-height:44px;
    background:#fff;
}

.form-control-custom:focus,
.form-select-custom:focus{
    border-color:var(--primary);
    box-shadow:none;
}

/* Buttons */
.btn-neon{
    background:var(--primary);
    border:none;
    color:white;
    border-radius:8px;
}

.btn-neon:hover{
    background:#1d4ed8;
    color:white;
}

.btn-neon-warning{
    background:#f59e0b;
    border:none;
    color:white;
    border-radius:8px;
}

.btn-neon-warning:hover{
    background:#d97706;
    color:white;
}

/* Utilities */
.text-neon{
    color:var(--primary)!important;
}

.text-bright{
    color:var(--text-main)!important;
}

.product-thumb{
    width:56px;
    height:56px;
    object-fit:cover;
    border-radius:8px;
    border:1px solid var(--border-color);
}

/* Footer */
footer{
    background:white;
    border-top:1px solid var(--border-color);
    color:var(--text-muted);
    margin-top:auto;
}

/* Preview */
#preview-area img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
    border:1px solid var(--border-color);
}

/* Responsive */
@media(max-width:992px){
    #sidebar-wrapper{
        transform:translateX(-100%);
    }

    #page-content-wrapper{
        margin-left:0;
        width:100%;
    }

    body.toggled #sidebar-wrapper{
        transform:translateX(0);
    }
}
</style>
</head>

<body>

<div id="wrapper">

    <!-- Sidebar -->
    <div id="sidebar-wrapper">
        <div class="sidebar-heading">
            <i class="bi bi-box-seam-fill me-2"></i>MODEL WORLD
        </div>

        <div class="list-group list-group-flush mt-3">
            <a href="/stats" class="list-group-item">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a href="/cata-mana" class="list-group-item">
                <i class="bi bi-tags"></i> Quản lý Danh mục
            </a>

            <a href="/product-mana" class="list-group-item active">
                <i class="bi bi-box-seam"></i> Quản lý Sản phẩm
            </a>

            <a href="/admin/vouchers" class="list-group-item">
                <i class="bi bi-ticket-perforated"></i> Quản lý Voucher
            </a>

            <a href="/orders-mana" class="list-group-item">
                <i class="bi bi-receipt"></i> Quản lý Đơn hàng
            </a>

            <a href="/user-mana" class="list-group-item">
                <i class="bi bi-people"></i> Quản lý Người dùng
            </a>

            <a href="/logout" class="list-group-item text-danger fw-bold">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </a>
        </div>
    </div>

    <!-- Content -->
    <div id="page-content-wrapper">

        <!-- Navbar -->
        <nav class="top-navbar d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-toggle" id="menu-toggle">
                    <i class="bi bi-list fs-5"></i>
                </button>
                <h5 class="mb-0 fw-bold">QUẢN LÝ SẢN PHẨM</h5>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <span class="d-block text-bright small">Admin User</span>
                    <span class="d-block text-muted" style="font-size:0.75rem;">Super Admin</span>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/147/147142.png"
                     class="rounded-circle border"
                     width="40" height="40">
            </div>
        </nav>

        <!-- Main -->
        <div class="container-fluid p-4">

            <div th:if="${message}" class="alert alert-dismissible fade show"
                 th:classappend="${messageType == 'danger' ? 'alert-danger' : 'alert-success'}">
                <strong th:text="${message}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">

                <!-- Form -->
                <div class="col-lg-4">
                    <form th:action="@{${product.id == null ? '/product-mana/add' : '/product-mana/update'}}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}">

                        <div class="table-container">
                            <h5 class="mb-4 fw-bold">
                                <i class="bi bi-box me-2 text-neon"></i>
                                <span th:text="${product.id == null ? 'Thêm sản phẩm mới' : 'Cập nhật sản phẩm'}"></span>
                            </h5>

                            <div class="row g-3">

                                <div class="col-12">
                                    <label class="small mb-1">Tên sản phẩm</label>
                                    <input th:field="*{name}" class="form-control form-control-custom" required>
                                </div>

                                <div class="col-6">
                                    <label class="small mb-1">Giá (VNĐ)</label>
                                    <input th:field="*{price}" type="number" class="form-control form-control-custom" required>
                                </div>

                                <div class="col-6">
                                    <label class="small mb-1">Danh mục</label>
                                    <select th:field="*{category.id}" class="form-select form-select-custom">
                                        <option th:each="c:${categories}"
                                                th:value="${c.id}"
                                                th:text="${c.name}">
                                        </option>
                                    </select>
                                </div>

                                <div class="col-6">
                                    <label class="small mb-1">Số lượng</label>
                                    <input th:field="*{quantity}" type="number" class="form-control form-control-custom">
                                </div>

                                <div class="col-6">
                                    <label class="small mb-1">Nặng (kg)</label>
                                    <input th:field="*{weight}" type="number" step="0.1" class="form-control form-control-custom">
                                </div>

                                <div class="col-12">
                                    <label class="small mb-1">Mô tả</label>
                                    <textarea th:field="*{description}" class="form-control form-control-custom" rows="3"></textarea>
                                </div>

                                <div class="col-12">
                                    <label class="small mb-1">Hình ảnh</label>
                                    <input type="file"
                                           name="imageFiles"
                                           id="imageInput"
                                           multiple
                                           class="form-control form-control-custom mb-2"
                                           th:required="${product.id == null}">
                                    <div id="preview-area" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>

                                <div class="col-12 mt-3">
                                    <button class="btn btn-neon w-100 fw-bold">
                                        <i class="bi bi-save me-2"></i>LƯU DỮ LIỆU
                                    </button>

                                    <a th:if="${product.id != null}"
                                       th:href="@{/product-mana}"
                                       class="btn btn-outline-secondary w-100 mt-2">
                                        Hủy chỉnh sửa
                                    </a>
                                </div>

                            </div>
                        </div>
                    </form>
                </div>

                <!-- List -->
                <div class="col-lg-8">
                    <div class="table-container h-100">

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="mb-0 fw-bold">
                                <i class="bi bi-list-task me-2 text-neon"></i>Danh sách sản phẩm
                            </h5>
                            <span class="badge bg-light text-dark border"
                                  th:text="${#lists.size(list)} + ' items'"></span>
                        </div>

                        <!-- Filter -->
                        <form th:action="@{/product-mana}" method="get" class="row g-3 mb-4">
                            <div class="col-md-4">
                                <input type="text"
                                       name="keywords"
                                       th:value="${keywords}"
                                       class="form-control form-control-custom"
                                       placeholder="Tìm theo tên...">
                            </div>

                            <div class="col-md-3">
                                <select name="categoryId" class="form-select form-select-custom">
                                    <option value="">Tất cả danh mục</option>
                                    <option th:each="c : ${categories}"
                                            th:value="${c.id}"
                                            th:text="${c.name}"
                                            th:selected="${c.id == selectedCata}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <select name="sort" class="form-select form-select-custom">
                                    <option value="" th:selected="${selectedSort == null}">Mới nhất</option>
                                    <option value="priceAsc" th:selected="${selectedSort == 'priceAsc'}">Giá thấp đến cao</option>
                                    <option value="priceDesc" th:selected="${selectedSort == 'priceDesc'}">Giá cao đến thấp</option>
                                </select>
                            </div>

                            <div class="col-md-2">
                                <button type="submit" class="btn btn-neon w-100">Lọc</button>
                            </div>
                        </form>

                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="table table-hover align-middle text-center">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Ảnh</th>
                                    <th class="text-start">Tên sản phẩm</th>
                                    <th>Danh mục</th>
                                    <th>Giá</th>
                                    <th>Kho</th>
                                    <th>Thao tác</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="p : ${list}">
                                    <td class="small text-muted" th:text="${'#' + p.id}"></td>

                                    <td>
                                        <th:block th:with="thumbList=${p.images.?[thumbnail == true]}">
                                            <img th:if="${not #lists.isEmpty(thumbList)}"
                                                 th:src="@{${thumbList[0].image}}"
                                                 class="product-thumb">

                                            <img th:if="${#lists.isEmpty(thumbList) and not #lists.isEmpty(p.images)}"
                                                 th:src="@{${p.images[0].image}}"
                                                 class="product-thumb">
                                        </th:block>
                                    </td>

                                    <td class="text-start fw-bold text-bright"
                                        th:text="${p.name}">
                                    </td>

                                    <td th:text="${p.category != null ? p.category.name : '-'}"></td>

                                    <td class="text-neon fw-bold"
                                        th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT') + ' đ'}">
                                    </td>

                                    <td>
                                        <span th:class="${p.quantity > 0 ? 'text-success' : 'text-danger'}"
                                              th:text="${p.quantity > 0 ? p.quantity : 'Hết'}">
                                        </span>
                                    </td>

                                    <td>
                                        <a th:href="@{/product-mana/edit/{id}(id=${p.id})}"
                                           class="btn btn-sm btn-neon-warning">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                    </td>
                                </tr>

                                <tr th:if="${list.empty}">
                                    <td colspan="7" class="text-center py-5 text-muted">
                                        Không tìm thấy sản phẩm nào.
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center py-4 small">
            © 2025 MODEL WORLD - Admin System
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const menuToggle = document.getElementById('menu-toggle');
const body = document.body;

if(menuToggle){
    menuToggle.addEventListener('click', function(e){
        e.preventDefault();
        body.classList.toggle('toggled');
    });
}

document.getElementById('imageInput').addEventListener('change', function(){
    const preview = document.getElementById('preview-area');
    preview.innerHTML = '';

    [...this.files].forEach(file=>{
        const reader = new FileReader();
        reader.onload = function(e){
            const img = document.createElement('img');
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
});
</script>

</body>
</html>
