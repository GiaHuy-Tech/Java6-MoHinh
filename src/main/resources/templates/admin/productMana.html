<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MODEL WORLD - Quản trị</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #e2e8f0;
            --accent: #38bdf8; /* Sky Blue */
            --border: #334155;
            --input-bg: #0f172a;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        /* Card Styles */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: rgba(56, 189, 248, 0.1);
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Form Controls */
        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background-color: var(--input-bg);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }
        label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        /* Table */
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-main);
            --bs-table-border-color: var(--border);
        }
        .table thead th {
            color: var(--accent);
            font-weight: 600;
            border-bottom-width: 2px;
        }
        
        /* Image Thumbnails */
        .product-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Badge Custom */
        .badge-custom { padding: 0.5em 0.8em; font-weight: 500; }
        
        /* Preview Grid */
        #preview-area img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 10px;
            border: 2px solid transparent;
        }
        #preview-area img.selected-thumb {
            border-color: var(--accent);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark border-bottom border-secondary px-4 py-3" style="background: #0b1120;">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold text-info">
            <i class="bi bi-box-seam-fill me-2"></i>QUẢN LÝ SẢN PHẨM
        </span>
        <a href="/" class="btn btn-outline-light btn-sm">Về trang chủ</a>
    </div>
</nav>

<div class="container-fluid py-4 px-4">
    
    <div th:if="${message}" class="alert alert-dismissible fade show" 
         th:classappend="${messageType == 'danger' ? 'alert-danger' : 'alert-success'}" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <strong th:text="${message}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        
        <div class="col-lg-4">
            <form th:action="@{${product.id == null ? '/product-mana/add' : '/product-mana/update'}}"
                  th:object="${product}"
                  method="post"
                  enctype="multipart/form-data">
                
                <input type="hidden" th:field="*{id}">

                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span th:text="${product.id == null ? 'THÊM SẢN PHẨM MỚI' : 'CẬP NHẬT SẢN PHẨM'}"></span>
                        <a th:if="${product.id != null}" th:href="@{/product-mana}" class="btn btn-sm btn-outline-secondary">Hủy</a>
                    </div>
                    
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label><i class="bi bi-tag-fill me-1"></i>Tên sản phẩm</label>
                                <input th:field="*{name}" class="form-control" placeholder="Nhập tên mô hình..." required>
                            </div>

                            <div class="col-6">
                                <label><i class="bi bi-currency-dollar me-1"></i>Giá (VNĐ)</label>
                                <input th:field="*{price}" type="number" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <label><i class="bi bi-bookmark-fill me-1"></i>Danh mục</label>
                                <select th:field="*{category.id}" class="form-select">
                                    <option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                                </select>
                            </div>

                            <div class="col-6">
                                <label><i class="bi bi-boxes me-1"></i>Số lượng</label>
                                <input th:field="*{quantity}" type="number" class="form-control" min="0">
                            </div>
                            <div class="col-6">
                                <label><i class="bi bi-speedometer2 me-1"></i>Nặng (kg)</label>
                                <input th:field="*{weight}" type="number" step="0.1" class="form-control">
                            </div>

                            <div class="col-12">
                                <label>Mô tả chi tiết</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>

                            <hr class="border-secondary my-2">

                            <div class="col-12">
                                <label class="text-info fw-bold mb-2">
                                    <i class="bi bi-images me-1"></i>Hình ảnh (Tối thiểu 2)
                                </label>
                                
                                <div th:if="${product.id != null}" class="mb-2 d-flex gap-2 overflow-auto pb-2">
                                    <div th:each="img : *{images}" class="position-relative">
                                        <img th:src="@{${img.image}}" class="product-thumb" style="width: 60px; height: 60px;">
                                        <span th:if="${img.thumbnail}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.5em;">Main</span>
                                    </div>
                                </div>

                                <input type="file" name="imageFiles" id="imageInput" multiple class="form-control mb-2" 
                                       th:required="${product.id == null}">
                                <small class="text-muted d-block fst-italic mb-2">Giữ phím <b>Ctrl</b> để chọn nhiều ảnh.</small>

                                <div class="input-group input-group-sm mb-2">
                                    <span class="input-group-text bg-dark text-light border-secondary">Ảnh đại diện là số:</span>
                                    <input type="number" name="thumbnailIndex" value="0" min="0" class="form-control text-center">
                                </div>
                                <small class="text-secondary">(0 là ảnh đầu tiên bạn chọn)</small>

                                <div id="preview-area" class="d-flex flex-wrap mt-2 gap-2"></div>
                            </div>

                            <div class="col-12 mt-4">
                                <button class="btn btn-info w-100 fw-bold text-dark">
                                    <i class="bi bi-save me-2"></i>LƯU DỮ LIỆU
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>DANH SÁCH SẢN PHẨM</span>
                    <span class="badge bg-primary rounded-pill" th:text="${#lists.size(list)} + ' items'"></span>
                </div>
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="bg-dark">
                            <tr>
                                <th>ID</th>
                                <th>Hình ảnh</th>
                                <th class="text-start">Tên sản phẩm</th>
                                <th>Giá bán</th>
                                <th>Kho</th>
                                <th>Loại</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${list}">
                                <td class="text-muted" th:text="${'#' + p.id}"></td>
                                
                                <td>
                                    <th:block th:with="thumbList=${p.images.?[thumbnail == true]}">
                                        <img th:if="${not #lists.isEmpty(thumbList)}" 
                                             th:src="@{${thumbList[0].image}}" class="product-thumb">
                                        
                                        <img th:if="${#lists.isEmpty(thumbList) and not #lists.isEmpty(p.images)}" 
                                             th:src="@{${p.images[0].image}}" class="product-thumb opacity-50">
                                        
                                        <span th:if="${#lists.isEmpty(p.images)}" class="text-muted small">No Img</span>
                                    </th:block>
                                </td>

                                <td class="text-start fw-bold text-light" th:text="${p.name}"></td>
                                <td class="text-info" th:text="${#numbers.formatInteger(p.price, 0, 'POINT') + ' đ'}"></td>
                                
                                <td>
                                    <span th:class="${p.quantity > 0 ? 'badge bg-dark border border-success text-success' : 'badge bg-danger text-dark'}" 
                                          th:text="${p.quantity > 0 ? p.quantity : 'Hết'}">
                                    </span>
                                </td>

                                <td th:text="${p.category != null ? p.category.name : '-'}"></td>
                                
                                <td>
                                    <a th:href="@{/product-mana/edit/{id}(id=${p.id})}" 
                                       class="btn btn-sm btn-outline-warning">
                                       <i class="bi bi-pencil-square"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer border-top border-secondary text-center text-muted small">
                    Hiển thị tối đa 50 dòng mới nhất
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewArea = document.getElementById('preview-area');

    imageInput.addEventListener('change', function() {
        previewArea.innerHTML = ''; // Xóa preview cũ
        const files = this.files;
        
        if (files.length > 0) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const imgContainer = document.createElement('div');
                        imgContainer.style.textAlign = 'center';
                        
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        
                        const indexLabel = document.createElement('span');
                        indexLabel.innerText = '#' + i;
                        indexLabel.style.fontSize = '12px';
                        indexLabel.style.color = '#ccc';
                        
                        imgContainer.appendChild(img);
                        imgContainer.appendChild(document.createElement('br'));
                        imgContainer.appendChild(indexLabel);
                        
                        previewArea.appendChild(imgContainer);
                    }
                    reader.readAsDataURL(file);
                }
            }
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
