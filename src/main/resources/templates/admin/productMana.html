<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý Sản phẩm - MODEL WORLD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
	--bg-body: #020609;
	--bg-sidebar: #05111a;
	--bg-card: #081a26;
	--text-main: #e0fbfc;
	--text-sub: #00f2ff;
	--accent-cyan: #00f2ff;
	--accent-green: #00ff9d;
	--border-color: #00f2ff;
	--sidebar-width: 260px;
}

body {
	background-color: var(--bg-body);
	color: var(--text-main);
	font-family: 'Be Vietnam Pro', sans-serif;
	overflow-x: hidden;
}

/* --- WRAPPER & SIDEBAR --- */
#wrapper { display: flex; width: 100%; transition: all 0.3s; }
#sidebar-wrapper {
	min-width: var(--sidebar-width); max-width: var(--sidebar-width);
	background-color: var(--bg-sidebar); border-right: 1px solid rgba(0, 242, 255, 0.3);
	min-height: 100vh; position: fixed; z-index: 1000; height: 100%;
}
#page-content-wrapper {
	width: 100%; margin-left: var(--sidebar-width); transition: margin 0.3s ease-out;
}
body.toggled #sidebar-wrapper { margin-left: calc(-1 * var(--sidebar-width)); }
body.toggled #page-content-wrapper { margin-left: 0; }

.sidebar-heading {
	padding: 1.5rem 1.25rem; font-family: 'Orbitron', sans-serif; font-size: 1.4rem;
	color: var(--accent-cyan); border-bottom: 1px solid rgba(0, 242, 255, 0.3);
	text-align: center; background: rgba(0, 242, 255, 0.1);
	text-shadow: 0 0 10px rgba(0, 242, 255, 0.7);
}
.list-group-item {
	background-color: transparent; color: var(--text-main); border: none;
	padding: 1rem 1.5rem; font-weight: 500; transition: all 0.2s;
	border-left: 3px solid transparent;
}
.list-group-item:hover, .list-group-item.active {
	color: var(--accent-cyan); background-color: rgba(0, 242, 255, 0.1);
	border-left-color: var(--accent-cyan); text-shadow: 0 0 5px var(--accent-cyan);
}
.list-group-item i { margin-right: 10px; width: 20px; text-align: center; }

/* Navbar */
.top-navbar {
	background: rgba(5, 17, 26, 0.95); backdrop-filter: blur(10px);
	border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding: 15px 30px;
	position: sticky; top: 0; z-index: 999;
}
.btn-toggle {
	background: transparent; border: 1px solid var(--accent-cyan);
	color: var(--accent-cyan); padding: 5px 12px; border-radius: 6px;
	transition: 0.3s; box-shadow: 0 0 5px rgba(0, 242, 255, 0.2);
}
.btn-toggle:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 15px var(--accent-cyan); }

.text-neon { color: var(--accent-cyan) !important; }
.text-bright { color: #ffffff !important; text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }

.table-container {
	background: var(--bg-card); border: 1px solid rgba(0, 242, 255, 0.3);
	border-radius: 8px; padding: 20px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
}

.table { --bs-table-bg: transparent; --bs-table-color: var(--text-main); }
.table thead th {
	color: var(--accent-cyan); border-bottom: 1px solid var(--accent-cyan);
	text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
	white-space: nowrap;
}
.table td { border-bottom: 1px solid rgba(0, 242, 255, 0.15); vertical-align: middle; }

.form-control-custom, .form-select-custom {
	background-color: rgba(5, 17, 26, 0.8); border: 1px solid rgba(0, 242, 255, 0.3); color: var(--text-main);
}
.form-control-custom:focus, .form-select-custom:focus {
	background-color: rgba(5, 17, 26, 1); border-color: var(--accent-cyan);
	color: #fff; box-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
}
.form-select-custom option { background-color: var(--bg-card); color: var(--text-main); }

.btn-neon {
	border: 1px solid var(--accent-cyan); color: var(--accent-cyan);
	background: transparent; transition: .3s;
}
.btn-neon:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 10px var(--accent-cyan); }
.btn-neon-warning {
	border: 1px solid #ffc107; color: #ffc107; background: transparent; transition: .3s;
}
.btn-neon-warning:hover { background: #ffc107; color: #000; box-shadow: 0 0 10px rgba(255, 193, 7, 0.6); }

.product-thumb {
	width: 50px; height: 50px; object-fit: cover; border-radius: 4px;
	border: 1px solid var(--accent-cyan);
}

.raindrop {
	position: absolute; width: 2px; height: 15px; background: var(--accent-cyan);
	opacity: 0.8; animation: fall linear infinite; z-index: 1; pointer-events: none;
}
@keyframes fall {
	0% { transform: translateY(-20px); opacity: 0; }
	50% { opacity: 1; }
	100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>
	<div id="rain" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></div>

	<div id="wrapper">
		<div id="sidebar-wrapper">
			<div class="sidebar-heading"><i class="bi bi-box-seam-fill me-2"></i>MODEL WORLD</div>
			<div class="list-group list-group-flush mt-3">
				<a href="/stats" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> Dashboard</a> 
				<a href="/cata-mana" class="list-group-item list-group-item-action"><i class="bi bi-tags"></i> Quản lý Danh mục</a> 
				<a href="/product-mana" class="list-group-item list-group-item-action active"><i class="bi bi-box-seam"></i> Quản lý Sản phẩm</a> 
				<a href="/admin/vouchers" class="list-group-item list-group-item-action"><i class="bi bi-ticket-perforated"></i> Quản lý Voucher</a> 
				<a href="/orders-mana" class="list-group-item list-group-item-action"><i class="bi bi-receipt"></i> Quản lý Đơn hàng</a> 
				<a href="/user-mana" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> Quản lý Người dùng</a> 
				<a href="/logout" class="list-group-item list-group-item-action text-danger fw-bold"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
			</div>
		</div>

		<div id="page-content-wrapper">
			<nav class="top-navbar d-flex justify-content-between align-items-center">
				<div class="d-flex align-items-center gap-3">
					<button class="btn btn-toggle" id="menu-toggle"><i class="bi bi-list fs-5"></i></button>
					<h5 class="mb-0 text-neon fw-bold d-none d-md-block">Quản lý Sản phẩm</h5>
				</div>
				<div class="d-flex align-items-center gap-3">
					<div class="text-end d-none d-sm-block">
						<span class="d-block text-bright small">Admin User</span> 
						<span class="d-block text-neon" style="font-size: 0.75rem;">Super Admin</span>
					</div>
					<img src="https://cdn-icons-png.flaticon.com/512/147/147142.png" class="rounded-circle border border-info" width="40" height="40">
				</div>
			</nav>

			<div class="container-fluid p-4">
				<div th:if="${message}" class="alert alert-dismissible fade show"
					th:classappend="${messageType == 'danger' ? 'alert-danger' : 'alert-success'}"
					th:style="${messageType == 'danger' ? 'background: rgba(255,0,0,0.1); border: 1px solid red; color: #ff6b6b;' : 'background: rgba(0,255,157,0.1); border: 1px solid var(--accent-green); color: var(--accent-green);'}"
					role="alert">
					<i class="bi" th:classappend="${messageType == 'danger' ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill'}"></i>
					<strong class="ms-2" th:text="${message}"></strong>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
				</div>

				<div class="row g-4">
					<div class="col-lg-4">
						<form th:action="@{${product.id == null ? '/product-mana/add' : '/product-mana/update'}}" th:object="${product}" method="post" enctype="multipart/form-data">
							<input type="hidden" th:field="*{id}">
							<div class="table-container">
								<h5 class="mb-4 text-bright text-uppercase"><i class="bi bi-box me-2 text-neon"></i> <span th:text="${product.id == null ? 'Thêm SP Mới' : 'Cập nhật SP'}"></span></h5>
								<div class="row g-3">
									<div class="col-12">
										<label class="text-bright small text-uppercase">Tên sản phẩm</label> 
										<input th:field="*{name}" class="form-control form-control-custom" required>
									</div>
									<div class="col-6">
										<label class="text-bright small text-uppercase">Giá (VNĐ)</label> 
										<input th:field="*{price}" type="number" class="form-control form-control-custom" required>
									</div>
									<div class="col-6">
										<label class="text-bright small text-uppercase">Danh mục</label> 
										<select th:field="*{category.id}" class="form-select form-select-custom">
											<option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option>
										</select>
									</div>
									<div class="col-6">
										<label class="text-bright small text-uppercase">Số lượng</label> 
										<input th:field="*{quantity}" type="number" class="form-control form-control-custom">
									</div>
									<div class="col-6">
										<label class="text-bright small text-uppercase">Nặng (kg)</label> 
										<input th:field="*{weight}" type="number" step="0.1" class="form-control form-control-custom">
									</div>
									<div class="col-12">
										<label class="text-bright small text-uppercase">Mô tả</label>
										<textarea th:field="*{description}" class="form-control form-control-custom" rows="2"></textarea>
									</div>
									<div class="col-12">
										<label class="text-neon small text-uppercase fw-bold">Hình ảnh (Min 2)</label>
										<input type="file" name="imageFiles" id="imageInput" multiple class="form-control form-control-custom mb-2" th:required="${product.id == null}">
										<div id="preview-area" class="d-flex flex-wrap gap-2 mt-2"></div>
									</div>
									<div class="col-12 mt-3">
										<button class="btn btn-neon w-100 fw-bold"><i class="bi bi-save me-2"></i>LƯU DỮ LIỆU</button>
										<a th:if="${product.id != null}" th:href="@{/product-mana}" class="btn btn-outline-secondary w-100 mt-2 btn-sm">Hủy chỉnh sửa</a>
									</div>
								</div>
							</div>
						</form>
					</div>

					<div class="col-lg-8">
						<div class="table-container h-100">
							<div class="d-flex justify-content-between align-items-center mb-4">
								<h5 class="mb-0 text-bright"><i class="bi bi-list-task me-2 text-neon"></i>Danh sách Sản phẩm</h5>
								<span class="badge border border-info text-neon" th:text="${#lists.size(list)} + ' items'"></span>
							</div>

							<form th:action="@{/product-mana}" method="get" class="row g-2 mb-4">
								<div class="col-md-4">
									<input type="text" name="keywords" th:value="${keywords}" class="form-control form-control-custom form-control-sm" placeholder="Tìm theo tên...">
								</div>
								<div class="col-md-3">
									<select name="categoryId" class="form-select form-select-custom form-select-sm">
										<option value="">Tất cả danh mục</option>
										<option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${c.id == selectedCata}"></option>
									</select>
								</div>
								<div class="col-md-3">
									<select name="sort" class="form-select form-select-custom form-select-sm">
										<option value="" th:selected="${selectedSort == null}">Mới nhất</option>
										<option value="priceAsc" th:selected="${selectedSort == 'priceAsc'}">Giá: Thấp đến Cao</option>
										<option value="priceDesc" th:selected="${selectedSort == 'priceDesc'}">Giá: Cao đến Thấp</option>
									</select>
								</div>
								<div class="col-md-2">
									<button type="submit" class="btn btn-neon btn-sm w-100">Lọc</button>
								</div>
							</form>

							<div class="table-responsive">
								<table class="table table-hover align-middle text-center">
									<thead>
										<tr>
											<th>ID</th>
											<th>Ảnh</th>
											<th class="text-start">Tên sản phẩm</th>
											<th>Danh mục</th> <th>Giá</th>
											<th>Kho</th>
											<th>Thao tác</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="p : ${list}">
											<td class="small text-secondary" th:text="${'#' + p.id}"></td>
											<td>
												<th:block th:with="thumbList=${p.images.?[thumbnail == true]}">
													<img th:if="${not #lists.isEmpty(thumbList)}" th:src="@{${thumbList[0].image}}" class="product-thumb">
													<img th:if="${#lists.isEmpty(thumbList) and not #lists.isEmpty(p.images)}" th:src="@{${p.images[0].image}}" class="product-thumb opacity-50">
												</th:block>
											</td>
											<td class="text-start fw-bold text-bright" th:text="${p.name}"></td>
											
											<td class="text-light small" th:text="${p.category != null ? p.category.name : '-'}"></td>
											
											<td class="text-neon" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
											<td>
												<span th:class="${p.quantity > 0 ? 'text-success' : 'text-danger'}" th:text="${p.quantity > 0 ? p.quantity : 'Hết'}"></span>
											</td>
											<td>
												<a th:href="@{/product-mana/edit/{id}(id=${p.id})}" class="btn btn-sm btn-neon-warning"><i class="bi bi-pencil-square"></i></a>
											</td>
										</tr>
										<tr th:if="${list.empty}"><td colspan="7" class="text-center py-5 text-neon">Không tìm thấy sản phẩm nào.</td></tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		document.getElementById('menu-toggle').addEventListener('click', () => document.body.classList.toggle('toggled'));

		const rain = document.getElementById('rain');
		for(let i=0; i<30; i++){
			const drop = document.createElement('div');
			drop.className = 'raindrop';
			drop.style.left = Math.random() * 100 + 'vw';
			drop.style.animationDuration = (Math.random() + 1) + 's';
			drop.style.animationDelay = Math.random() * 2 + 's';
			rain.appendChild(drop);
		}

		document.getElementById('imageInput').addEventListener('change', function() {
			const preview = document.getElementById('preview-area');
			preview.innerHTML = '';
			[...this.files].forEach(file => {
				const reader = new FileReader();
				reader.onload = e => {
					const img = document.createElement('img');
					img.src = e.target.result;
					img.style.width = '60px'; img.style.height = '60px'; img.style.objectFit = 'cover';
					img.className = 'border border-info rounded';
					preview.appendChild(img);
				};
				reader.readAsDataURL(file);
			});
		});
	</script>
</body>
</html>
