<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<div class="container mt-4">
    <h3>Danh sách đơn hàng</h3>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Khách hàng</th>
            <th>Ngày tạo</th>
            <th>Phí ship</th>
            <th>Tổng tiền</th>
            <th>Thanh toán</th>
            <th>Trạng thái</th>
            <th>Chi tiết</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="order : ${ordersList}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.account != null ? order.account.fullname : '---'}"></td>
            <td th:text="${#dates.format(order.createdDate,'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#numbers.formatDecimal(order.feeship,0,'COMMA',0,'POINT')} + ' đ'"></td>
            <td th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' đ'"></td>

            <td>
                <span th:if="${order.paymentStatus}" class="badge bg-success">Đã thanh toán</span>
                <span th:unless="${order.paymentStatus}" class="badge bg-danger">Chưa thanh toán</span>
            </td>

            <td>
                <form th:action="@{/orders-mana/updateStatus}" method="post">
                    <input type="hidden" name="id" th:value="${order.id}"/>

                    <select name="status" class="form-select"
                            onchange="this.form.submit()">

                        <option th:value="0" th:selected="${order.status == 0}">Chờ xác nhận</option>
                        <option th:value="1" th:selected="${order.status == 1}">Đã xác nhận</option>
                        <option th:value="2" th:selected="${order.status == 2}">Đang giao</option>
                        <option th:value="3" th:selected="${order.status == 3}">Hoàn tất</option>
                        <option th:value="4" th:selected="${order.status == 4}">Đã hủy</option>
                    </select>
                </form>
            </td>

            <td>
                <a th:href="@{'/orders-mana/detail/' + ${order.id}}"
                   class="btn btn-primary btn-sm">
                    Xem
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
