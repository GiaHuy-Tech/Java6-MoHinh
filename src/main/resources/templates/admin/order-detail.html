<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<div class="container mt-4">

    <h3>Chi tiết đơn hàng #<span th:text="${order.id}"></span></h3>

    <div class="mb-3">
        <p><b>Khách hàng:</b>
            <span th:text="${order.account.fullname}"></span>
        </p>

        <p><b>SĐT:</b>
            <span th:text="${order.phone}"></span>
        </p>

        <p><b>Địa chỉ:</b>
            <span th:text="${order.address.fullAddress}"></span>
        </p>

        <p><b>Ngày tạo:</b>
            <span th:text="${#dates.format(order.createdDate,'dd/MM/yyyy HH:mm')}"></span>
        </p>

        <p><b>Phí ship:</b>
            <span th:text="${#numbers.formatDecimal(order.feeship,0,'COMMA',0,'POINT')} + ' đ'"></span>
        </p>

        <p><b>Tổng tiền:</b>
            <span th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' đ'"></span>
        </p>
    </div>

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Ảnh</th>
            <th>Sản phẩm</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="detail : ${orderDetails}">
            <td>
                <img th:src="@{'/images/' + ${detail.product.image}}"
                     width="60"/>
            </td>

            <td th:text="${detail.product.name}"></td>

            <td th:text="${#numbers.formatDecimal(detail.price,0,'COMMA',0,'POINT')} + ' đ'"></td>

            <td th:text="${detail.quantity}"></td>

            <td th:text="${#numbers.formatDecimal(detail.price * detail.quantity,0,'COMMA',0,'POINT')} + ' đ'"></td>
        </tr>
        </tbody>
    </table>

    <a href="/orders-mana" class="btn btn-secondary">Quay lại</a>

</div>

</body>
</html>
