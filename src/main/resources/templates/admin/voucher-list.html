<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý Voucher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f5f6f8;
    font-family:Arial,sans-serif;
    color:#333;
}

/* Layout */
#wrapper{
    display:flex;
    min-height:100vh;
}

#sidebar-wrapper{
    width:240px;
    background:#fff;
    border-right:1px solid #ddd;
    position:fixed;
    height:100%;
    overflow-y:auto;
}

#page-content-wrapper{
    margin-left:240px;
    width:100%;
}

/* Sidebar */
.sidebar-heading{
    padding:20px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    border-bottom:1px solid #ddd;
    background:#f8f9fa;
}

.list-group-item{
    border:none;
    padding:14px 20px;
    color:#333;
}

.list-group-item:hover,
.list-group-item.active{
    background:#e9ecef;
    color:#000;
    font-weight:bold;
}

/* Navbar */
.top-navbar{
    background:#fff;
    border-bottom:1px solid #ddd;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar-title{
    font-size:20px;
    font-weight:bold;
    margin:0;
}

.admin-profile{
    display:flex;
    align-items:center;
    gap:10px;
}

.admin-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#dee2e6;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* Main content */
.page-content{
    padding:25px;
}

.main-card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    padding:20px;
    margin-bottom:20px;
}

/* Form */
.form-label{
    font-weight:bold;
    margin-bottom:6px;
}

/* Table */
.table th{
    background:#f8f9fa;
}

.status-active{
    color:green;
    font-weight:bold;
}

.status-hidden{
    color:red;
    font-weight:bold;
}

.btn-action{
    width:35px;
    height:35px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<div id="wrapper">

    <!-- Sidebar -->
    <div id="sidebar-wrapper">
        <div class="sidebar-heading">
            MODEL WORLD
        </div>

        <div class="list-group list-group-flush">
            <a href="/stats" class="list-group-item">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
            <a href="/cata-mana" class="list-group-item">
                <i class="bi bi-tags me-2"></i> Quản lý Danh mục
            </a>
            <a href="/product-mana" class="list-group-item">
                <i class="bi bi-box-seam me-2"></i> Quản lý Sản phẩm
            </a>
            <a href="/admin/vouchers" class="list-group-item active">
                <i class="bi bi-ticket-perforated me-2"></i> Quản lý Voucher
            </a>
            <a href="/orders-mana" class="list-group-item">
                <i class="bi bi-receipt me-2"></i> Quản lý Đơn hàng
            </a>
            <a href="/user-mana" class="list-group-item">
                <i class="bi bi-people me-2"></i> Quản lý Người dùng
            </a>
            <a href="/admin/cart" class="list-group-item">
                <i class="bi bi-cart3 me-2"></i> Giỏ hàng Admin
            </a>
            <a href="/logout" class="list-group-item text-danger">
                <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
            </a>
        </div>
    </div>

    <!-- Content -->
    <div id="page-content-wrapper">

        <!-- Navbar -->
        <nav class="top-navbar">
            <h4 class="navbar-title">Quản lý Voucher</h4>

            <div class="admin-profile">
                <span>Admin User</span>
                <div class="admin-avatar">
                    <i class="bi bi-person-fill"></i>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="page-content">
            <div class="row g-4">

                <!-- Form -->
                <div class="col-lg-4">
                    <div class="main-card">
                        <form method="post" th:action="@{/admin/vouchers/save}">
                            <input type="hidden" name="id" th:value="${voucher.id}">

                            <div class="mb-3">
                                <label class="form-label">Mã Voucher</label>
                                <input type="text" name="code" class="form-control"
                                       th:value="${voucher.code}" required>
                            </div>

                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Giảm %</label>
                                    <input type="number" name="discountPercent"
                                           class="form-control"
                                           th:value="${voucher.discountPercent}">
                                </div>

                                <div class="col-6 mb-3">
                                    <label class="form-label">Giảm tiền</label>
                                    <input type="number" name="discountAmount"
                                           class="form-control"
                                           th:value="${voucher.discountAmount}">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ngày hết hạn</label>
                                <input type="datetime-local" name="expiredAt"
                                       class="form-control"
                                       th:value="${voucher.expiredAt}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Hạng áp dụng</label>
                                <select name="membershipId" class="form-select">
                                    <option value="0">Tất cả hạng thành viên</option>
                                    <option th:each="m:${memberships}"
                                            th:value="${m.id}"
                                            th:text="${m.name}"
                                            th:selected="${voucher.membership != null and voucher.membership.id == m.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="form-check mb-2">
                                <input type="checkbox" name="isFreeShipping"
                                       class="form-check-input"
                                       th:checked="${voucher.isFreeShipping}">
                                <label class="form-check-label">Miễn phí vận chuyển</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" name="isBirthday"
                                       class="form-check-input"
                                       th:checked="${voucher.isBirthday}">
                                <label class="form-check-label">Voucher sinh nhật</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Lưu dữ liệu
                            </button>

                            <a th:if="${voucher.id != null}"
                               th:href="@{/admin/vouchers}"
                               class="btn btn-secondary w-100 mt-2">
                                Hủy chỉnh sửa
                            </a>
                        </form>
                    </div>
                </div>

                <!-- Table -->
                <div class="col-lg-8">
                    <div class="main-card">

                        <!-- Filter -->
                        <form method="get" th:action="@{/admin/vouchers}" class="row g-3 mb-4">
                            <div class="col-md-3">
                                <input type="text" name="keyword" class="form-control"
                                       placeholder="Tìm mã voucher..." th:value="${keyword}">
                            </div>

                            <div class="col-md-3">
                                <select name="discountType" class="form-select">
                                    <option value="">Loại giảm giá</option>
                                    <option value="percent">Giảm %</option>
                                    <option value="amount">Giảm tiền</option>
                                    <option value="freeship">FreeShip</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <select name="status" class="form-select">
                                    <option value="">Trạng thái</option>
                                    <option value="active">Active</option>
                                    <option value="hidden">Hidden</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <button type="submit" class="btn btn-primary w-100">
                                    Lọc
                                </button>
                            </div>
                        </form>

                        <!-- Voucher Table -->
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover text-center">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Code</th>
                                        <th>Giảm giá</th>
                                        <th>Membership</th>
                                        <th>Hết hạn</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:if="${#lists.isEmpty(vouchers)}">
                                        <td colspan="7">Không có dữ liệu voucher.</td>
                                    </tr>

                                    <tr th:each="v:${vouchers}">
                                        <td th:text="${v.id}"></td>
                                        <td th:text="${v.code}"></td>

                                        <td>
                                            <span th:if="${v.discountPercent != null}"
                                                  th:text="${v.discountPercent + '%'}"></span>
                                            <span th:if="${v.discountAmount != null}"
                                                  th:text="${v.discountAmount + ' ₫'}"></span>
                                            <span th:if="${v.isFreeShipping}">FreeShip</span>
                                        </td>

                                        <td>
                                            <span th:if="${v.membership != null}"
                                                  th:text="${v.membership.name}"></span>
                                            <span th:unless="${v.membership != null}">
                                                Tất cả
                                            </span>
                                        </td>

                                        <td th:text="${#temporals.format(v.expiredAt,'dd/MM/yyyy HH:mm')}"></td>

                                        <td>
                                            <span th:if="${v.active}" class="status-active">Active</span>
                                            <span th:unless="${v.active}" class="status-hidden">Hidden</span>
                                        </td>

                                        <td>
                                            <a th:href="@{'/admin/vouchers/edit/' + ${v.id}}"
                                               class="btn btn-sm btn-warning btn-action">
                                                <i class="bi bi-pencil-square"></i>
                                            </a>

                                            <a th:if="${v.active}"
                                               th:href="@{'/admin/vouchers/hide/' + ${v.id}}"
                                               class="btn btn-sm btn-danger btn-action">
                                                <i class="bi bi-eye-slash"></i>
                                            </a>

                                            <a th:unless="${v.active}"
                                               th:href="@{'/admin/vouchers/show/' + ${v.id}}"
                                               class="btn btn-sm btn-success btn-action">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
