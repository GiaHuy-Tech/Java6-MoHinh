<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quản lý Voucher - MODEL WORLD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg-body:#020609;
--bg-sidebar:#05111a;
--bg-card:#081a26;
--text-main:#e0fbfc;
--accent-cyan:#00f2ff;
--accent-green:#00ff9d;
--sidebar-width:260px;
}

body{
background:var(--bg-body);
color:var(--text-main);
font-family:'Be Vietnam Pro',sans-serif;
overflow-x:hidden;
}

/* wrapper */

#wrapper{display:flex;width:100%}

#sidebar-wrapper{
min-width:var(--sidebar-width);
max-width:var(--sidebar-width);
background:var(--bg-sidebar);
border-right:1px solid rgba(0,242,255,0.3);
min-height:100vh;
position:fixed;
}

#page-content-wrapper{
width:100%;
margin-left:var(--sidebar-width);
}

/* sidebar */

.sidebar-heading{
padding:1.5rem;
font-family:'Orbitron',sans-serif;
font-size:1.4rem;
color:var(--accent-cyan);
text-align:center;
border-bottom:1px solid rgba(0,242,255,0.3);
}

.list-group-item{
background:transparent;
color:var(--text-main);
border:none;
padding:1rem 1.5rem;
border-left:3px solid transparent;
}

.list-group-item:hover,
.list-group-item.active{
color:var(--accent-cyan);
background:rgba(0,242,255,0.1);
border-left-color:var(--accent-cyan);
}

/* navbar */

.top-navbar{
background:rgba(5,17,26,0.95);
border-bottom:1px solid rgba(0,242,255,0.3);
padding:15px 30px;
}

/* containers */

.table-container{
background:var(--bg-card);
border:1px solid rgba(0,242,255,0.3);
border-radius:8px;
padding:20px;
box-shadow:0 0 10px rgba(0,242,255,0.1);
}

/* table */

.table{
--bs-table-bg:transparent;
--bs-table-color:var(--text-main);
}

.table thead th{
color:var(--accent-cyan);
border-bottom:1px solid var(--accent-cyan);
background:rgba(0,242,255,0.05);
}

/* form */

.form-control-custom,
.form-select-custom{
background:rgba(5,17,26,0.8);
border:1px solid rgba(0,242,255,0.3);
color:var(--text-main);
}

.form-control-custom:focus,
.form-select-custom:focus{
border-color:var(--accent-cyan);
box-shadow:0 0 8px rgba(0,242,255,0.4);
background:rgba(5,17,26,1);
}

/* buttons */

.btn-neon{
border:1px solid var(--accent-cyan);
color:var(--accent-cyan);
background:transparent;
}

.btn-neon:hover{
background:var(--accent-cyan);
color:black;
box-shadow:0 0 10px var(--accent-cyan);
}

/* badge */

.badge-active{
background:#16a34a;
}

.badge-hidden{
background:#ef4444;
}

/* rain */

.raindrop{
position:absolute;
width:2px;
height:15px;
background:var(--accent-cyan);
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px);opacity:0}
50%{opacity:1}
100%{transform:translateY(100vh);opacity:0}
}

</style>

</head>

<body>

<div id="rain" style="position:fixed;width:100%;height:100%;pointer-events:none"></div>

<div id="wrapper">

<!-- SIDEBAR -->

<div id="sidebar-wrapper">

<div class="sidebar-heading">
<i class="bi bi-box-seam-fill me-2"></i>MODEL WORLD
</div>

<div class="list-group list-group-flush mt-3">

<a href="/stats" class="list-group-item list-group-item-action">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="/cata-mana" class="list-group-item list-group-item-action">
<i class="bi bi-tags"></i> Quản lý Danh mục
</a>

<a href="/product-mana" class="list-group-item list-group-item-action">
<i class="bi bi-box-seam"></i> Quản lý Sản phẩm
</a>

<a href="/admin/vouchers" class="list-group-item list-group-item-action active">
<i class="bi bi-ticket-perforated"></i> Quản lý Voucher
</a>

<a href="/orders-mana" class="list-group-item list-group-item-action">
<i class="bi bi-receipt"></i> Quản lý Đơn hàng
</a>

<a href="/user-mana" class="list-group-item list-group-item-action">
<i class="bi bi-people"></i> Quản lý Người dùng
</a>

<a href="/admin/cart" class="list-group-item list-group-item-action">
<i class="bi bi-cart3"></i> Giỏ hàng Admin
</a>

<div class="mt-4 px-3">
<small class="text-neon fw-bold text-uppercase" style="font-size:0.7rem;">
Hệ thống
</small>
</div>

<a href="/logout" class="list-group-item list-group-item-action text-danger fw-bold">
<i class="bi bi-box-arrow-right"></i> Đăng xuất
</a>

</div>

</div>

<!-- CONTENT -->

<div id="page-content-wrapper">

<nav class="top-navbar d-flex justify-content-between">

<h5 class="text-info">Quản lý Voucher</h5>

</nav>

<div class="container-fluid p-4">

<div class="row g-4">

<!-- FORM -->

<div class="col-lg-4">

<div class="table-container">

<h5 class="mb-3 text-uppercase">

<i class="bi bi-ticket-perforated text-info"></i>

<span th:text="${voucher.id == null} ? 'Tạo Voucher' : 'Chỉnh sửa Voucher'"></span>

</h5>

<form method="post" th:action="@{/admin/vouchers/save}">

<input type="hidden" name="id" th:value="${voucher.id}">

<div class="mb-3">

<label>Mã Voucher</label>

<input type="text" name="code" class="form-control form-control-custom" th:value="${voucher.code}">

</div>

<div class="mb-3">

<label>Giảm %</label>

<input type="number" name="discountPercent" class="form-control form-control-custom" th:value="${voucher.discountPercent}">

</div>

<div class="mb-3">

<label>Giảm tiền</label>

<input type="number" name="discountAmount" class="form-control form-control-custom" th:value="${voucher.discountAmount}">

</div>

<div class="mb-3">

<label>Ngày hết hạn</label>

<input type="datetime-local" name="expiredAt" class="form-control form-control-custom">

</div>

<div class="mb-3">

<label>Membership</label>

<select name="membershipId" class="form-select form-select-custom">

<option value="0">Tất cả</option>

<option th:each="m:${memberships}"
th:value="${m.id}"
th:text="${m.name}">
</option>

</select>

</div>

<div class="form-check mb-2">

<input type="checkbox" name="isFreeShipping" class="form-check-input">

<label class="form-check-label">Free Shipping</label>

</div>

<div class="form-check mb-3">

<input type="checkbox" name="isBirthday" class="form-check-input">

<label class="form-check-label">Voucher sinh nhật</label>

</div>

<button class="btn btn-neon w-100">

<i class="bi bi-save"></i>

Lưu Voucher

</button>

</form>

</div>

</div>

<!-- TABLE -->

<div class="col-lg-8">

<div class="table-container">

<h5 class="mb-3">Danh sách Voucher</h5>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>

<th>ID</th>
<th>Code</th>
<th>Giảm giá</th>
<th>Membership</th>
<th>Hết hạn</th>
<th>Trạng thái</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="v:${vouchers}">

<td th:text="${v.id}"></td>

<td th:text="${v.code}"></td>

<td>

<span th:if="${v.discountPercent != null}" th:text="${v.discountPercent + '%'}"></span>

<span th:if="${v.discountAmount != null}" th:text="${v.discountAmount + '₫'}"></span>

<span th:if="${v.isFreeShipping}">FreeShip</span>

</td>

<td>

<span th:if="${v.membership != null}" th:text="${v.membership.name}"></span>

<span th:unless="${v.membership != null}">All</span>

</td>

<td th:text="${#temporals.format(v.expiredAt,'dd/MM/yyyy HH:mm')}"></td>

<td>

<span th:if="${v.active}" class="badge badge-active">Active</span>

<span th:unless="${v.active}" class="badge badge-hidden">Hidden</span>

</td>

<td>

<a th:href="@{'/admin/vouchers/edit/' + ${v.id}}" class="btn btn-sm btn-warning">

<i class="bi bi-pencil"></i>

</a>

<a th:href="@{'/admin/vouchers/hide/' + ${v.id}}" class="btn btn-sm btn-danger">

<i class="bi bi-eye-slash"></i>

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const rain=document.getElementById('rain')

for(let i=0;i<50;i++){

const drop=document.createElement('div')

drop.classList.add('raindrop')

drop.style.left=Math.random()*100+'vw'

drop.style.animationDuration=(Math.random()*1+0.5)+'s'

drop.style.animationDelay=Math.random()*5+'s'

rain.appendChild(drop)

}

</script>

</body>
</html>
