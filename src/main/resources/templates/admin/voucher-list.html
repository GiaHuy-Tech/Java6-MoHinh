
<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quản lý Voucher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#0b0f19;
    color:white;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
}

.table{
    color:white;
}

.table thead{
    background:#0f172a;
}

.badge-active{
    background:#16a34a;
}

.badge-hidden{
    background:#ef4444;
}

.btn-neon{
    border:1px solid #00f2ff;
    color:#00f2ff;
}

.btn-neon:hover{
    background:#00f2ff;
    color:black;
}

</style>

</head>

<body>

<div class="container py-4">

<h3 class="mb-4">
<i class="bi bi-ticket-perforated"></i>
Quản lý Voucher
</h3>

<div class="row g-4">

<!-- FORM CREATE / EDIT -->

<div class="col-md-4">

<div class="card p-3">

<h5 th:text="${voucher.id == null} ? 'Tạo Voucher' : 'Chỉnh sửa Voucher'"></h5>

<form method="post" th:action="@{/admin/vouchers/save}">

<input type="hidden" name="id" th:value="${voucher.id}">

<div class="mb-3">
<label>Mã Voucher</label>
<input type="text"
       name="code"
       class="form-control"
       th:value="${voucher.code}"
       required>
</div>

<div class="mb-3">
<label>Giảm %</label>
<input type="number"
       name="discountPercent"
       class="form-control"
       th:value="${voucher.discountPercent}">
</div>

<div class="mb-3">
<label>Giảm tiền (₫)</label>
<input type="number"
       name="discountAmount"
       class="form-control"
       th:value="${voucher.discountAmount}">
</div>

<div class="mb-3">
<label>Ngày hết hạn</label>
<input type="datetime-local"
       name="expiredAt"
       class="form-control">
</div>

<div class="mb-3">

<label>Hạng thành viên</label>

<select name="membershipId" class="form-select">

<option value="0">Tất cả</option>

<option th:each="m : ${memberships}"
        th:value="${m.id}"
        th:text="${m.name}"
        th:selected="${voucher.membership != null and voucher.membership.id == m.id}">
</option>

</select>

</div>

<div class="form-check mb-2">

<input class="form-check-input"
       type="checkbox"
       name="isFreeShipping"
       th:checked="${voucher.isFreeShipping}">

<label class="form-check-label">
Free Shipping
</label>

</div>

<div class="form-check mb-3">

<input class="form-check-input"
       type="checkbox"
       name="isBirthday"
       th:checked="${voucher.isBirthday}">

<label class="form-check-label">
Voucher sinh nhật
</label>

</div>

<button class="btn btn-neon w-100">

<i class="bi bi-save"></i>
Lưu Voucher

</button>

</form>

</div>

</div>

<!-- TABLE -->

<div class="col-md-8">

<div class="card p-3">

<h5 class="mb-3">Danh sách Voucher</h5>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>
<th>ID</th>
<th>Code</th>
<th>Giảm giá</th>
<th>Membership</th>
<th>Hết hạn</th>
<th>Trạng thái</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="v : ${vouchers}">

<td th:text="${v.id}"></td>

<td th:text="${v.code}"></td>

<td>

<span th:if="${v.discountPercent != null}"
      th:text="${v.discountPercent + '%'}"></span>

<span th:if="${v.discountAmount != null}"
      th:text="${v.discountAmount + '₫'}"></span>

<span th:if="${v.isFreeShipping}">
FreeShip
</span>

</td>

<td>

<span th:if="${v.membership != null}"
      th:text="${v.membership.name}"></span>

<span th:unless="${v.membership != null}">
All
</span>

</td>

<td th:text="${#temporals.format(v.expiredAt,'dd/MM/yyyy HH:mm')}"></td>

<td>

<span th:if="${v.active}"
      class="badge badge-active">
Active
</span>

<span th:unless="${v.active}"
      class="badge badge-hidden">
Hidden
</span>

</td>

<td>

<a th:href="@{'/admin/vouchers/edit/' + ${v.id}}"
   class="btn btn-sm btn-warning">
<i class="bi bi-pencil"></i>
</a>

<a th:if="${v.active}"
   th:href="@{'/admin/vouchers/hide/' + ${v.id}}"
   class="btn btn-sm btn-danger">
<i class="bi bi-eye-slash"></i>
</a>

<a th:unless="${v.active}"
   th:href="@{'/admin/vouchers/show/' + ${v.id}}"
   class="btn btn-sm btn-success">
<i class="bi bi-eye"></i>
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
