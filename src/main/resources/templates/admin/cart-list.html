				<!doctype html>
				<html lang="vi" xmlns:th="http://www.thymeleaf.org">
				<head>
				<meta charset="utf-8">
				<meta name="viewport" content="width=device-width, initial-scale=1">
				<title>Thống kê Giỏ hàng - MODEL WORLD</title>
				
				<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
				<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
				
				<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
				
				<style>
				
				:root{
				--bg-body:#020609;
				--bg-sidebar:#05111a;
				--bg-card:#081a26;
				--text-main:#e0fbfc;
				--accent-cyan:#00f2ff;
				--accent-green:#00ff9d;
				--accent-purple:#bc13fe;
				--sidebar-width:260px;
				}
				
				body{
				background-color:var(--bg-body);
				color:var(--text-main);
				font-family:'Be Vietnam Pro',sans-serif;
				overflow-x:hidden;
				}
				
				#wrapper{
				display:flex;
				width:100%;
				}
				
				#sidebar-wrapper{
				min-width:var(--sidebar-width);
				max-width:var(--sidebar-width);
				background-color:var(--bg-sidebar);
				border-right:1px solid rgba(0,242,255,0.3);
				min-height:100vh;
				position:fixed;
				z-index:1000;
				height:100%;
				overflow-y:auto;
				}
				
				#page-content-wrapper{
				width:100%;
				margin-left:var(--sidebar-width);
				display:flex;
				flex-direction:column;
				min-height:100vh;
				}
				
				.sidebar-heading{
				padding:1.5rem;
				font-family:'Orbitron',sans-serif;
				font-weight:900;
				font-size:1.5rem;
				color:var(--accent-cyan);
				border-bottom:1px solid rgba(0,242,255,0.3);
				text-align:center;
				}
				
				.list-group-item{
				background:transparent;
				color:var(--text-main);
				border:none;
				padding:1rem 1.5rem;
				border-left:3px solid transparent;
				}
				
				.list-group-item:hover,
				.list-group-item.active{
				color:var(--accent-cyan);
				background:rgba(0,242,255,0.1);
				border-left-color:var(--accent-cyan);
				}
				
				.top-navbar{
				background:#05111a;
				border-bottom:1px solid rgba(0,242,255,0.3);
				padding:15px 30px;
				display:flex;
				justify-content:space-between;
				align-items:center;
				}
				
				.page-title{
				font-family:'Orbitron',sans-serif;
				font-weight:700;
				}
				
				.cyber-card{
				background:var(--bg-card);
				border:1px solid rgba(0,242,255,0.3);
				border-radius:8px;
				padding:25px;
				margin-bottom:20px;
				}
				
				.stat-value{
				font-family:'Orbitron';
				font-size:2rem;
				font-weight:700;
				}
				
				.stat-label{
				font-size:.9rem;
				color:#a0b1c5;
				text-transform:uppercase;
				}
				
				.icon-box{
				width:50px;
				height:50px;
				border-radius:10px;
				display:flex;
				align-items:center;
				justify-content:center;
				font-size:1.5rem;
				background:rgba(0,242,255,0.1);
				color:var(--accent-cyan);
				border:1px solid rgba(0,242,255,0.3);
				}
				
				.table{
				color:var(--text-main);
				--bs-table-bg:transparent;
				}
				
				.table thead th{
				background:rgba(0,242,255,0.05);
				color:var(--accent-cyan);
				border-bottom:1px solid rgba(0,242,255,0.3);
				padding:15px;
				}
				
				.table tbody td{
				border-bottom:1px solid rgba(255,255,255,0.05);
				padding:15px;
				}
				
				.product-img{
				width:50px;
				height:50px;
				object-fit:cover;
				border-radius:6px;
				}
				
				.rank-badge{
				width:30px;
				height:30px;
				display:inline-flex;
				align-items:center;
				justify-content:center;
				border-radius:50%;
				font-weight:bold;
				}
				
				.rank-1{color:#ffd700}
				.rank-2{color:#c0c0c0}
				.rank-3{color:#cd7f32}
				
				.progress-slim{
				height:6px;
				background:rgba(255,255,255,0.1);
				border-radius:10px;
				}
				
				.progress-bar-cyan{
				background:var(--accent-cyan);
				}
				
				</style>
				</head>
				
				<body>
				
				<div id="wrapper">
				
				<div id="sidebar-wrapper">
				
				<div class="sidebar-heading">
				MODEL WORLD
				</div>
				
				<div class="list-group list-group-flush">
				
				<a href="/stats" class="list-group-item">Dashboard</a>
				
				<a href="/product-mana" class="list-group-item">
				Sản phẩm
				</a>
				
				<a href="/orders-mana" class="list-group-item">
				Đơn hàng
				</a>
				
				<a href="/admin/cart" class="list-group-item active">
				Giỏ hàng
				</a>
				
				<a href="/logout" class="list-group-item text-danger">
				Đăng xuất
				</a>
				
				</div>
				</div>
				
				
				<div id="page-content-wrapper">
				
				<nav class="top-navbar">
				
				<h4 class="page-title">PHÂN TÍCH GIỎ HÀNG</h4>
				
				</nav>
				
				<div class="container-fluid px-4 pb-4">
				
				<div class="row g-4 mt-2 mb-4">
				
				<div class="col-md-6">
				
				<div class="cyber-card d-flex align-items-center">
				
				<div class="icon-box me-3">
				<i class="bi bi-basket3"></i>
				</div>
				
				<div>
				
				<div class="stat-value"
				th:text="${totalItemsInCarts}">
				0
				</div>
				
				<div class="stat-label">
				Tổng sản phẩm trong giỏ
				</div>
				
				</div>
				
				</div>
				
				</div>
				
				
				<div class="col-md-6">
				
				<div class="cyber-card d-flex align-items-center">
				
				<div class="icon-box me-3">
				<i class="bi bi-upc-scan"></i>
				</div>
				
				<div>
				
				<div class="stat-value"
				th:text="${#lists.size(cartStats)}">
				0
				</div>
				
				<div class="stat-label">
				Sản phẩm được quan tâm
				</div>
				
				</div>
				
				</div>
				
				</div>
				
				</div>
				
				
				
				<div class="cyber-card">
				
				<h5 class="mb-4">
				
				TOP SẢN PHẨM TRONG GIỎ
				
				</h5>
				
				<div class="table-responsive">
				
				<table class="table table-hover">
				
				<thead>
				
				<tr>
				<th>Hạng</th>
				<th>Sản phẩm</th>
				<th>Giá</th>
				<th>Category</th>
				<th>Số lượng</th>
				</tr>
				
				</thead>
				
				<tbody>
				
				<tr th:each="item,stat : ${cartStats}">
				
				<td>
				
				<span th:if="${stat.index==0}" class="rank-badge rank-1">1</span>
				<span th:if="${stat.index==1}" class="rank-badge rank-2">2</span>
				<span th:if="${stat.index==2}" class="rank-badge rank-3">3</span>
				
				<span th:if="${stat.index>2}"
				th:text="${stat.index+1}">
				</span>
				
				</td>
				
				
				<td>
				
				<div class="d-flex align-items-center">
				
				<img class="product-img me-3"
				
				th:src="${item.product.mainImage != null ? item.product.mainImage : '/images/no-image.png'}"
				
				onerror="this.src='https://placehold.co/50x50?text=Model'">
				
				<div>
				
				<div class="fw-bold"
				th:text="${item.product.name}">
				</div>
				
				<div class="small text-white-50"
				th:text="'ID: #' + ${item.product.id}">
				</div>
				
				</div>
				
				</div>
				
				</td>
				
				
				<td style="color:var(--accent-green)"
				
				th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + ' ₫'">
				
				</td>
				
				
				<td>
				
				<span
				
				th:text="${item.product.category != null ? item.product.category.name : 'N/A'}">
				
				</span>
				
				</td>
				
				
				<td>
				
				<div class="d-flex justify-content-between">
				
				<span
				th:text="${item.totalQuantity}">
				</span>
				
				<small>
				lượt thêm
				</small>
				
				</div>
				
				<div class="progress progress-slim">
				
				<div class="progress-bar progress-bar-cyan"
     th:style="'width:' + (${item.totalQuantity} * 100.0 / ${cartStats[0].totalQuantity}) + '%'">
</div>
				
				</div>
				
				</td>
				
				</tr>
				
				
				<tr th:if="${#lists.isEmpty(cartStats)}">
				
				<td colspan="5" class="text-center">
				
				Chưa có sản phẩm nào trong giỏ
				
				</td>
				
				</tr>
				
				</tbody>
				
				</table>
				
				</div>
				
				</div>
				
				</div>
				
				</div>
				
				</div>
				
				</body>
				</html>
