<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thống kê Giỏ hàng - MODEL WORLD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --sidebar:#1f2937;
    --sidebar-hover:#374151;
    --primary:#2563eb;
    --primary-light:#eff6ff;
    --border:#e5e7eb;
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --success:#059669;
    --danger:#dc2626;
    --sidebar-width:250px;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* Layout */
#wrapper{
    display:flex;
    min-height:100vh;
}

/* Sidebar */
#sidebar-wrapper{
    width:var(--sidebar-width);
    background:var(--sidebar);
    color:white;
    position:fixed;
    height:100vh;
    left:0;
    top:0;
}

.sidebar-heading{
    padding:24px;
    font-size:20px;
    font-weight:700;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.list-group-item{
    background:none;
    border:none;
    color:#d1d5db;
    padding:15px 22px;
    font-weight:500;
    transition:.2s;
}

.list-group-item:hover{
    background:var(--sidebar-hover);
    color:white;
}

.list-group-item.active{
    background:rgba(255,255,255,.08);
    color:white;
    border-left:4px solid var(--primary);
}

.list-group-item.text-danger{
    color:#fca5a5 !important;
}

/* Main */
#page-content-wrapper{
    margin-left:var(--sidebar-width);
    width:calc(100% - var(--sidebar-width));
}

/* Navbar */
.top-navbar{
    background:white;
    border-bottom:1px solid var(--border);
    padding:18px 30px;
}

.page-title{
    margin:0;
    font-size:22px;
    font-weight:700;
}

/* Cards */
.stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:22px;
    display:flex;
    align-items:center;
    gap:16px;
}

.icon-box{
    width:52px;
    height:52px;
    border-radius:10px;
    background:var(--primary-light);
    color:var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.stat-value{
    font-size:28px;
    font-weight:700;
}

.stat-label{
    font-size:14px;
    color:var(--muted);
}

/* Table Card */
.content-card{
    background:white;
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;
}

.section-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:20px;
}

/* Table */
.table{
    margin-bottom:0;
}

.table thead th{
    background:#f9fafb;
    color:#374151;
    font-weight:600;
    border-bottom:1px solid var(--border);
    padding:14px;
}

.table tbody td{
    padding:16px 14px;
    vertical-align:middle;
    border-bottom:1px solid #f1f5f9;
}

.table-hover tbody tr:hover{
    background:#f9fafb;
}

/* Product */
.product-img{
    width:52px;
    height:52px;
    object-fit:cover;
    border-radius:8px;
    border:1px solid #e5e7eb;
}

/* Rank */
.rank-badge{
    min-width:32px;
    height:32px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    background:#f3f4f6;
    color:#374151;
}

/* Progress */
.progress-slim{
    height:8px;
    margin-top:8px;
    border-radius:999px;
    background:#e5e7eb;
}

.progress-bar{
    background:var(--primary);
}

/* Price */
.price-text{
    color:var(--success);
    font-weight:600;
}

/* Responsive */
@media(max-width:768px){
    #sidebar-wrapper{
        width:100%;
        height:auto;
        position:relative;
    }

    #page-content-wrapper{
        margin-left:0;
        width:100%;
    }

    #wrapper{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div id="wrapper">

    <!-- Sidebar -->
    <div id="sidebar-wrapper">
        <div class="sidebar-heading">
            MODEL WORLD
        </div>

        <div class="list-group list-group-flush">
            <a href="/stats" class="list-group-item">
                <i class="bi bi-grid me-2"></i> Dashboard
            </a>

            <a href="/product-mana" class="list-group-item">
                <i class="bi bi-box-seam me-2"></i> Sản phẩm
            </a>

            <a href="/orders-mana" class="list-group-item">
                <i class="bi bi-receipt me-2"></i> Đơn hàng
            </a>

            <a href="/admin/cart" class="list-group-item active">
                <i class="bi bi-cart3 me-2"></i> Giỏ hàng
            </a>

            <a href="/logout" class="list-group-item text-danger">
                <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
            </a>
        </div>
    </div>

    <!-- Main -->
    <div id="page-content-wrapper">

        <!-- Navbar -->
        <nav class="top-navbar">
            <h4 class="page-title">Thống kê Giỏ hàng</h4>
        </nav>

        <!-- Content -->
        <div class="container-fluid px-4 py-4">

            <!-- Stats -->
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="stat-card">
                        <div class="icon-box">
                            <i class="bi bi-basket3"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${totalItemsInCarts}">0</div>
                            <div class="stat-label">Tổng sản phẩm trong giỏ</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="stat-card">
                        <div class="icon-box">
                            <i class="bi bi-upc-scan"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${#lists.size(cartStats)}">0</div>
                            <div class="stat-label">Sản phẩm được quan tâm</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="content-card">
                <h5 class="section-title">Top sản phẩm trong giỏ</h5>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">

                        <thead>
                        <tr>
                            <th>Hạng</th>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Danh mục</th>
                            <th>Số lượng</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="item,stat : ${cartStats}">

                            <!-- Rank -->
                            <td>
                                <span class="rank-badge"
                                      th:text="${stat.index + 1}">1</span>
                            </td>

                            <!-- Product -->
                            <td>
                                <div class="d-flex align-items-center">
                                    <img class="product-img me-3"
                                         th:src="${item.product.mainImage != null ? item.product.mainImage : '/images/no-image.png'}"
                                         onerror="this.src='https://placehold.co/52x52?text=No'">

                                    <div>
                                        <div class="fw-semibold"
                                             th:text="${item.product.name}"></div>
                                        <div class="small text-muted"
                                             th:text="'ID: #' + ${item.product.id}"></div>
                                    </div>
                                </div>
                            </td>

                            <!-- Price -->
                            <td class="price-text"
                                th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + ' ₫'">
                            </td>

                            <!-- Category -->
                            <td>
                                <span th:text="${item.product.category != null ? item.product.category.name : 'N/A'}"></span>
                            </td>

                            <!-- Quantity -->
                            <td>
                                <div class="d-flex justify-content-between">
                                    <span th:text="${item.totalQuantity}"></span>
                                    <small class="text-muted">lượt thêm</small>
                                </div>

                                <div class="progress progress-slim">
                                    <div class="progress-bar"
                                         th:style="'width:' + (${item.totalQuantity} * 100.0 / ${cartStats[0].totalQuantity}) + '%'">
                                    </div>
                                </div>
                            </td>

                        </tr>

                        <!-- Empty -->
                        <tr th:if="${#lists.isEmpty(cartStats)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                Chưa có sản phẩm nào trong giỏ
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
