<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta charset="UTF-8">
<title>Thêm địa chỉ</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>

	<div class="container mt-5">
		<div class="card shadow">
			<div class="card-header bg-dark text-white">
				<h4 class="mb-0">Thêm địa chỉ mới</h4>
			</div>

			<div class="card-body">
				<form th:action="@{/account/address/add}" method="post"
					th:object="${address}">

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label">Họ và tên</label> <input type="text"
								class="form-control" th:field="*{fullName}" required>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label">Số điện thoại</label> <input
								type="text" class="form-control" th:field="*{phone}" required>
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label">Đường</label> <input type="text"
							class="form-control" th:field="*{street}" required>
					</div>

					<div class="row">
						<div class="col-md-4 mb-3">
							<label class="form-label">Phường / Xã</label> <input type="text"
								class="form-control" th:field="*{ward}" required>
						</div>

						<div class="col-md-4 mb-3">
							<label class="form-label">Quận / Huyện</label> <input type="text"
								class="form-control" th:field="*{district}" required>
						</div>

						<div class="col-md-4 mb-3">
							<label class="form-label">Thành phố</label> <input type="text"
								class="form-control" th:field="*{city}" required>
						</div>
					</div>

					<div class="d-flex justify-content-between mt-4">
						<a th:href="@{/account}" class="btn btn-secondary"> ← Quay lại
						</a>

						<button type="submit" class="btn btn-success">Lưu địa chỉ
						</button>
					</div>

				</form>
			</div>
		</div>
	</div>

</body>
</html>
