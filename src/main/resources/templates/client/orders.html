<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đơn hàng của tôi - MODEL WORLD</title>
    <th:block th:if="${_csrf != null}">
        <meta name="_csrf" th:content="${_csrf.token}" />
        <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    </th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #0b0c10; --bg-card: #1f2833; --bg-nav: #0b0c10; --text-main: #66fcf1; --text-light: #c5c6c7; --text-dim: #999999; --accent-cyan: #45a29e; --border-color: #2d3238; --shadow: rgba(0,0,0,0.5); }
        [data-theme="light"] { --bg-body: #f8f9fa; --bg-card: #ffffff; --bg-nav: #ffffff; --text-main: #00adb5; --text-light: #222831; --text-dim: #666666; --border-color: #dee2e6; --shadow: rgba(0,0,0,0.08); }
        body { background-color: var(--bg-body); color: var(--text-light); font-family: 'Be Vietnam Pro', sans-serif; transition: 0.3s; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .top-navbar { background: var(--bg-nav); border-bottom: 1px solid var(--border-color); position: sticky; top:0; z-index: 2000; padding: 12px 0; box-shadow: 0 2px 10px var(--shadow); }
        .nav-logo span { font-family: 'Montserrat'; font-weight: 900; color: var(--text-main); font-size: 1.7rem; }
        .order-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 15px; margin-bottom: 30px; overflow: hidden; transition: 0.3s; box-shadow: 0 5px 15px var(--shadow); }
        .badge-status { padding: 8px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; border: 1px solid; }
        .status-4 { color: #00ffcc; border-color: #00ffcc; background: rgba(0,255,204,0.1); }
        .product-img-box { width: 80px; height: 80px; background: #fff; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); }
        .product-img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 15px; }
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="container-fluid px-lg-5 nav-holder">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-4">
                <a href="/" class="text-decoration-none nav-logo"><span>MODEL WORLD</span></a>
                <a href="/products" class="nav-icon-link d-none d-lg-flex align-items-center gap-2" style="font-size: 1rem; font-weight: 600; text-decoration: none; color: var(--text-light);">
                    <i class="bi bi-box-seam"></i> SẢN PHẨM
                </a>
            </div>
            <div class="d-flex align-items-center gap-4">
                <div class="theme-toggle nav-icon-link" style="cursor: pointer;" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></div>
                <div th:if="${user != null}">
                    <img th:src="${user.avatar ?: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="rounded-circle border border-info" width="38" height="38" style="object-fit:cover;">
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h3 style="font-family: 'Montserrat'; font-weight: 900; color: var(--text-main); text-transform: uppercase; border-left: 5px solid var(--accent-cyan); padding-left: 15px;">
            QUẢN LÝ ĐƠN HÀNG
        </h3>
        <div th:if="${reviewSuccess}" class="alert alert-success alert-dismissible fade show rounded-pill px-4 mb-0">
            <i class="bi bi-check-circle-fill me-2"></i> Đánh giá đã được gửi thành công!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div class="p-3 px-4 border-bottom border-secondary d-flex justify-content-between align-items-center">
            <div>
                <span class="text-main fw-bold me-3 fs-5" th:text="'#DH' + ${order.id}"></span>
                <span style="color: var(--text-dim); font-size: 0.9rem;"><i class="bi bi-calendar3 me-1"></i> <span th:text="${#dates.format(order.createdDate, 'dd/MM/yyyy HH:mm')}"></span></span>
            </div>
            <span th:class="'badge-status status-' + ${order.status}" th:text="${order.status == 4 ? '🎉 Hoàn tất' : 'Đơn hàng'}"></span>
        </div>

        <div class="p-4">
            <div th:each="detail : ${order.orderDetails}" class="d-flex align-items-center gap-4 mb-3 pb-3 border-bottom border-dark border-opacity-25">
                <div class="product-img-box"><img th:src="${detail.product.mainImage}"></div>
                <div class="flex-grow-1">
                    <h6 class="mb-1 fw-bold text-white" th:text="${detail.product.name}"></h6>
                    <div style="color: var(--text-dim); font-size: 0.9rem;">Số lượng: <span class="text-main fw-bold" th:text="${detail.quantity}"></span></div>
                    
                    <div th:if="${order.status == 4}" class="mt-2">
                        <button th:if="${!reviewedKeys.contains(order.id + '_' + detail.product.id)}"
                                type="button" class="btn btn-sm btn-outline-warning fw-bold rounded-pill btn-review-trigger" 
                                th:data-id="${detail.product.id}" 
                                th:data-name="${detail.product.name}"
                                th:data-orderid="${order.id}">
                            <i class="bi bi-star-fill me-1"></i> Đánh giá sản phẩm
                        </button>
                        
                        <span th:if="${reviewedKeys.contains(order.id + '_' + detail.product.id)}" class="badge border border-secondary text-dim rounded-pill px-3">
                            <i class="bi bi-check2-all me-1"></i> Đã đánh giá đơn này
                        </span>
                    </div>
                </div>
                <div class="text-end fw-bold text-main" th:text="${#numbers.formatDecimal(detail.price,0,'COMMA',0,'POINT')} + '₫'"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-white">
            <form th:action="@{/orders/submit-review}" method="post">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-main">Viết đánh giá</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="productId" id="modalProductId">
                    <input type="hidden" name="orderId" id="modalOrderId"> <p>Sản phẩm: <span id="modalProductName" class="fw-bold text-info"></span></p>
                    <div class="mb-3">
                        <label class="form-label">Đánh giá sao:</label>
                        <select name="rating" class="form-select bg-dark text-white border-secondary">
                            <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                            <option value="4">⭐⭐⭐⭐ (4/5)</option>
                            <option value="3">⭐⭐⭐ (3/5)</option>
                            <option value="2">⭐⭐ (2/5)</option>
                            <option value="1">⭐ (1/5)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cảm nhận:</label>
                        <textarea name="content" class="form-control bg-dark text-white border-secondary" rows="4" required></textarea>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-info px-4 fw-bold">GỬI ĐÁNH GIÁ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('click', function (e) {
        const trigger = e.target.closest('.btn-review-trigger');
        if (trigger) {
            document.getElementById('modalProductId').value = trigger.getAttribute('data-id');
            document.getElementById('modalProductName').innerText = trigger.getAttribute('data-name');
            document.getElementById('modalOrderId').value = trigger.getAttribute('data-orderid'); // Lấy OrderId từ data attribute
            
            const reviewModal = new bootstrap.Modal(document.getElementById('reviewModal'));
            reviewModal.show();
        }
    });

    function toggleTheme() {
        const h = document.documentElement;
        const isDark = h.getAttribute('data-theme') === 'dark';
        h.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeIcon').className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
    }
</script>
</body>
</html>
