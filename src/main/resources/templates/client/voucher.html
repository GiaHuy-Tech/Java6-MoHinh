<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kho Ưu Đãi - Model World</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>

:root{
--bg-body:#050b14;
--bg-panel:#0b1426;
--text-main:#e1e7ff;
--text-sub:#aab8c5;
--accent-cyan:#00f2ff;
--accent-gold:#ffd700;
--accent-purple:#bd00ff;
--border-color:rgba(255,255,255,0.15);
}

body{
background:var(--bg-body);
color:var(--text-main);
font-family:"Be Vietnam Pro",sans-serif;
}

/* NAVBAR */

.navbar{
background:rgba(12,21,37,0.95);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border-color);
}

.navbar-brand span{
font-family:'Orbitron';
letter-spacing:1px;
color:#fff;
}

.nav-link{
color:#aab8c5!important;
transition:0.3s;
font-weight:500;
}

.nav-link:hover{
color:var(--accent-cyan)!important;
text-shadow:0 0 8px var(--accent-cyan);
}

/* SEARCH */

.search-bar-wrapper{
background:rgba(255,255,255,0.05);
border:1px solid var(--border-color);
border-radius:50px;
padding:4px 15px;
}

.form-control-custom,
.form-select-custom{
background:transparent;
border:none;
color:var(--accent-cyan);
}

.btn-search{
background:none;
border:none;
color:var(--text-sub);
}

/* PAGE HEADER */

.page-header{
text-align:center;
padding:40px 0 20px;
}

.page-title{
font-family:'Orbitron';
font-weight:700;
letter-spacing:2px;
}

.page-subtitle{
color:var(--text-sub);
}

/* VOUCHER CARD */

.voucher-card{
background:var(--bg-panel);
border:1px solid var(--border-color);
border-radius:16px;
overflow:hidden;
display:flex;
height:140px;
transition:0.3s;
}

.voucher-card:hover{
transform:translateY(-5px);
border-color:var(--accent-cyan);
box-shadow:0 8px 25px rgba(0,242,255,0.2);
}

.voucher-left{
width:32%;
background:rgba(0,242,255,0.1);
border-right:2px dashed rgba(255,255,255,0.2);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.discount-val{
font-family:'Orbitron';
font-weight:700;
font-size:1.4rem;
color:var(--accent-cyan);
}

.discount-label{
font-size:0.75rem;
color:#fff;
}

.voucher-right{
width:68%;
padding:15px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.voucher-title{
font-weight:600;
font-size:0.95rem;
}

.voucher-date{
font-size:0.75rem;
opacity:0.8;
}

.btn-claim{
border:1px solid var(--accent-cyan);
color:var(--accent-cyan);
background:rgba(0,242,255,0.05);
padding:5px 15px;
border-radius:6px;
font-size:0.85rem;
}

.btn-claim:hover{
background:var(--accent-cyan);
color:#000;
}

.hidden{
display:none!important;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top">

<div class="container">

<a class="navbar-brand d-flex align-items-center gap-2" href="/">
<i class="bi bi-box-seam-fill fs-3 text-info"></i>
<span class="fw-bold fs-4">MODEL WORLD</span>
</a>

<button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="bi bi-list text-white fs-2"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto align-items-center">

<li class="nav-item mx-1">
<a class="nav-link" href="/products">
<i class="bi bi-grid me-1"></i> Sản phẩm
</a>
</li>

<th:block th:if="${session.account == null}">
<li class="nav-item mx-1">
<a class="nav-link" href="/login">
<i class="bi bi-box-arrow-in-right"></i> Đăng nhập
</a>
</li>
</th:block>

<th:block th:if="${session.account != null}">

<li class="nav-item mx-1">
<a class="nav-link" href="/cart">
<i class="bi bi-cart3"></i> Giỏ hàng
</a>
</li>

<li class="nav-item mx-1">
<a class="nav-link" href="/orders">
<i class="bi bi-receipt"></i> Đơn hàng
</a>
</li>

<li class="nav-item mx-1">
<a class="nav-link" href="/wishlist">
<i class="bi bi-heart"></i> Yêu thích
</a>
</li>

<li class="nav-item dropdown mx-2">

<a class="nav-link dropdown-toggle p-0 d-flex align-items-center"
data-bs-toggle="dropdown">

<img th:if="${session.account.avatar != null}"
th:src="@{${session.account.avatar}}"
class="rounded-circle border border-info"
style="width:38px;height:38px;object-fit:cover">

<i th:if="${session.account.avatar == null}"
class="bi bi-person-circle fs-3 text-info"></i>

</a>

<ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">

<li>
<a class="dropdown-item" href="/account">
<i class="bi bi-person"></i> Tài khoản
</a>
</li>

<li>
<hr class="dropdown-divider">
</li>

<li>
<a class="dropdown-item text-danger" href="/logout">
<i class="bi bi-box-arrow-right"></i> Đăng xuất
</a>
</li>

</ul>
</li>

</th:block>

</ul>

</div>
</div>
</nav>

<div class="container pb-5">

<div class="page-header">

<h2 class="page-title">Kho Ưu Đãi</h2>

<p class="page-subtitle">
Săn mã giảm giá độc quyền
</p>

</div>

<div class="row g-4" id="voucherListContainer">

<th:block th:each="v : ${availableVouchers}">

<div class="col-md-6 col-lg-4 voucher-item"

th:data-search="${(v.discountPercent != null ? v.discountPercent + '%' : '') + ' ' + (v.discountAmount != null ? v.discountAmount.toString() : '')}">

<div class="voucher-card">

<div class="voucher-left">

<div class="discount-val">

<span th:if="${v.discountPercent != null}"
th:text="${v.discountPercent + '%'}"></span>

<span th:if="${v.discountPercent == null}"
th:text="${#numbers.formatDecimal(v.discountAmount/1000,0,'POINT',0,'POINT') + 'K'}"></span>

</div>

<div class="discount-label">
GIẢM GIÁ
</div>

</div>

<div class="voucher-right">

<div class="voucher-title"

th:text="${'Giảm ' + (v.discountPercent != null ? v.discountPercent + '%' : #numbers.formatDecimal(v.discountAmount,0,'POINT',0,'POINT') + 'đ')}">

Voucher

</div>

<div class="d-flex justify-content-between align-items-end">

<div class="voucher-date">

HSD:
<span th:text="${#temporals.format(v.expiredAt,'dd/MM/yyyy')}"></span>

</div>

<form th:action="@{/voucher/claim}" method="post">

<input type="hidden" name="voucherId" th:value="${v.id}">

<button type="submit" class="btn btn-claim">
Lưu mã
</button>

</form>

</div>

</div>

</div>

</div>

</th:block>

</div>

</div>

<footer class="text-center py-4 border-top border-secondary border-opacity-25 mt-5">

<div class="container">

<p class="mb-0 small text-secondary">
© 2025 Model World
</p>

</div>

</footer>

<script>

function searchVouchers(){

const searchText=document.getElementById("voucherSearchInput")?.value?.toLowerCase()||"";

const items=document.querySelectorAll(".voucher-item");

items.forEach(item=>{

const data=item.getAttribute("data-search").toLowerCase();

if(data.includes(searchText)){

item.classList.remove("hidden");

}else{

item.classList.add("hidden");

}

});

}

</script>

</body>
</html>
