<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký - Model World</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
	rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap"
	rel="stylesheet">

<style>
/* GIỮ NGUYÊN CSS CỦA BẠN */
:root {
	--bg-card: rgba(12, 21, 37, 0.95);
	--text-light: #e1e7ff;
	--accent-cyan: #00f2ff;
	--border-color: rgba(0, 242, 255, 0.3);
	--font-main: "Be Vietnam Pro", sans-serif;
	--font-logo: "Orbitron", sans-serif;
}

body {
	background: linear-gradient(135deg, rgba(5, 11, 20, 0.85),
		rgba(5, 11, 20, 0.7)),
		url('https://file.hstatic.net/200000838897/article/anime_figure_008aea7949c540cd8500f596197eb317.jpg')
		center/cover no-repeat fixed;
	color: var(--text-light);
	font-family: var(--font-main);
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

.navbar {
	background-color: rgba(12, 21, 37, 0.9);
	border-bottom: 1px solid var(--border-color);
}

.register-wrapper {
	flex-grow: 1;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 40px 20px;
}

.register-card {
	display: flex;
	width: 100%;
	max-width: 1000px;
	background: var(--bg-card);
	border: 1px solid var(--border-color);
	border-radius: 16px;
	overflow: hidden;
	box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
}

.register-image {
	flex: 1;
	background:
		url('https://beegaming.com.vn/wp-content/uploads/2023/04/mo-hinh-onepiece-gia-re-beegaming-1-scaled.jpg')
		center/cover no-repeat;
	display: none;
}

@media (min-width: 992px) {
	.register-image {
		display: block;
	}
}

.register-form-container {
	flex: 1.2;
	padding: 40px;
}

.form-control-custom, .form-select-custom {
	background: rgba(0, 0, 0, 0.3);
	border: 1px solid rgba(255, 255, 255, 0.15);
	color: #fff;
	border-radius: 8px;
	padding: 10px 12px;
	width: 100%;
}

.btn-register {
	background: var(--accent-cyan);
	color: #050b14;
	border: none;
	font-weight: 700;
	padding: 12px;
	border-radius: 8px;
	width: 100%;
	margin-top: 20px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top">
	<div class="container">
		<a class="navbar-brand d-flex align-items-center gap-2" href="/">
			<i class="bi bi-box-seam-fill fs-3 text-info"></i>
			<span class="fw-bold fs-4">MODEL WORLD</span>
		</a>
	</div>
</nav>

<section class="register-wrapper">
	<div class="register-card">
		<div class="register-image"></div>

		<div class="register-form-container">

			<h3 class="text-white fw-bold mb-3">TẠO TÀI KHOẢN</h3>

			<form th:action="@{/register}" th:object="${account}" method="post">

				<div class="mb-3">
					<label class="form-label text-info">Họ và tên</label>
					<input type="text" class="form-control-custom"
						th:field="*{fullName}">
					<div class="invalid-feedback d-block"
						th:errors="*{fullName}"></div>
				</div>

				<div class="mb-3">
					<label class="form-label text-info">Email</label>
					<input type="email" class="form-control-custom"
						th:field="*{email}">
					<div class="invalid-feedback d-block"
						th:errors="*{email}"></div>
				</div>

				<div class="mb-3">
					<label class="form-label text-info">Mật khẩu</label>
					<input type="password" class="form-control-custom"
						th:field="*{password}">
					<div class="invalid-feedback d-block"
						th:errors="*{password}"></div>
				</div>

				<div class="row mb-3">
					<div class="col-md-6">
						<label class="form-label text-info">Số điện thoại</label>
						<input type="text" class="form-control-custom"
							th:field="*{phone}">
						<div class="invalid-feedback d-block"
							th:errors="*{phone}"></div>
					</div>

					<div class="col-md-6">
						<label class="form-label text-info">Giới tính</label>
						<select class="form-select-custom"
							th:field="*{gender}">
							<option th:value="true">Nam</option>
							<option th:value="false">Nữ</option>
						</select>
					</div>
				</div>

				<div class="mb-3">
					<label class="form-label text-info">Ngày sinh</label>
					<input type="date" class="form-control-custom"
						th:field="*{birthDay}">
				</div>

				<button type="submit" class="btn-register">
					ĐĂNG KÝ NGAY
				</button>

			</form>

		</div>
	</div>
</section>

</body>
</html>
