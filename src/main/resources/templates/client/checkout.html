<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - MODEL WORLD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #0b0c10; --bg-card: #141b26; --text-main: #66fcf1; --text-light: #c5c6c7; --border-color: #2d3238; --sidebar-width: 260px; }
        body { background-color: var(--bg-body); color: var(--text-light); font-family: 'Be Vietnam Pro', sans-serif; margin: 0; }
        #wrapper { display: flex; width: 100%; }
        #sidebar-wrapper { min-width: var(--sidebar-width); background: #050505; border-right: 1px solid var(--border-color); min-height: 100vh; position: fixed; }
        #page-content-wrapper { width: 100%; margin-left: var(--sidebar-width); display: flex; flex-direction: column; min-height: 100vh; }
        .sidebar-heading { padding: 2.5rem 1.5rem; font-family: 'Orbitron'; font-size: 1.4rem; color: var(--text-main); text-decoration: none; display: block; text-align: center; }
        .list-group-item { background: transparent; color: #888; border: none; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; text-decoration: none;}
        .list-group-item:hover, .list-group-item.active { color: var(--text-main); background: rgba(102, 252, 241, 0.05); border-left: 4px solid var(--text-main); }
        .top-navbar { background: rgba(31, 40, 51, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 15px 30px; position: sticky; top: 0; z-index: 999; }
        .checkout-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 15px; overflow: hidden; }
        .card-header-custom { background: rgba(102, 252, 241, 0.03); padding: 18px 25px; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-family: 'Orbitron'; text-transform: uppercase; font-size: 0.9rem; }
        .form-select-dark { background-color: #1f2833 !important; color: var(--text-main) !important; border: 1px solid var(--border-color) !important; padding: 12px; }
        .price-text { font-family: 'Orbitron'; font-weight: 700; color: var(--text-main); }
        .btn-confirm { background: var(--text-main); color: #000; font-weight: 800; border: none; padding: 15px; border-radius: 8px; text-transform: uppercase; width: 100%; }
        .btn-confirm:hover:not(:disabled) { background: #fff; box-shadow: 0 0 20px var(--text-main); transform: translateY(-2px); transition: 0.3s; }
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div id="wrapper">
    <!-- Sidebar -->
    <div id="sidebar-wrapper">
        <a href="/" class="sidebar-heading">MODEL WORLD</a>
        <div class="list-group list-group-flush px-2">
            <a href="/" class="list-group-item"><i class="bi bi-house-door me-3"></i>Trang chủ</a>
            <a href="/products" class="list-group-item"><i class="bi bi-box me-3"></i>Sản phẩm</a>
            <a href="/cart" class="list-group-item active"><i class="bi bi-cart3 me-3"></i>Giỏ hàng</a>
            <a href="/orders" class="list-group-item"><i class="bi bi-bag-check me-3"></i>Đơn hàng</a>
            <hr class="border-secondary mx-3">
            <a href="/account" class="list-group-item"><i class="bi bi-person me-3"></i>Tài khoản</a>
        </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">
        <nav class="top-navbar d-flex justify-content-between align-items-center">
            <span class="fw-bold text-main"><i class="bi bi-shield-check me-2"></i>THANH TOÁN AN TOÀN</span>
            <div th:if="${user != null}" class="dropdown">
                <a href="#" class="text-decoration-none dropdown-toggle text-light" data-bs-toggle="dropdown">
                    <img th:src="${user.avatar ?: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="rounded-circle me-2" width="30">
                    <span th:text="${user.fullName}">User</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                    <li><a class="dropdown-item" href="/profile">Hồ sơ</a></li>
                    <li><a class="dropdown-item text-danger" href="/logout">Đăng xuất</a></li>
                </ul>
            </div>
        </nav>

        <div class="container-fluid py-5 px-4">
            <div class="row g-4">
                <!-- Left Side: Shipping & Payment -->
                <div class="col-lg-7">
                    <div class="checkout-card mb-4">
                        <div class="card-header-custom"><i class="bi bi-truck me-2"></i> Thông tin giao hàng</div>
                        <div class="card-body p-4">
                            <!-- Form Đặt Hàng Chính -->
                            <form th:action="@{/checkout/confirm}" method="post" id="checkoutForm">
                                <!-- Giữ voucherCode khi submit -->
                                <input type="hidden" name="voucherCode" th:value="${voucherCode}" />

                                <div class="mb-4">
                                    <label class="form-label text-info fw-bold small">ĐỊA CHỈ NHẬN HÀNG</label>
                                    <div th:if="${addresses == null || addresses.isEmpty()}" class="alert alert-warning bg-transparent small">
                                        Bạn chưa có địa chỉ. <a href="/account" class="text-main fw-bold">Thêm ngay</a>
                                    </div>
                                    
                                    <!-- FIX: Sửa onchange để tải lại trang (GET) thay vì đặt hàng (POST) -->
                                    <select class="form-select form-select-dark" name="addressId" required 
                                            th:unless="${addresses == null || addresses.isEmpty()}"
                                            onchange="location.href='/checkout?addressId=' + this.value + (document.querySelector('input[name=voucherCode]').value ? '&voucherCode=' + document.querySelector('input[name=voucherCode]').value : '')">
                                        <option value="" disabled th:selected="${selectedAddressId == null}">-- Chọn địa chỉ nhận hàng --</option>
                                        <option th:each="addr : ${addresses}" 
                                                th:value="${addr.id}"
                                                th:selected="${addr.id == selectedAddressId}"
                                                th:text="${addr.recipientName + ' | ' + addr.recipientPhone + ' | ' + addr.getFullAddress()}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label text-info fw-bold small text-uppercase">Phương thức thanh toán</label>
                                    <div class="d-grid gap-2">
                                        <input type="radio" class="btn-check" name="paymentMethod" id="payVNPAY" value="VNPAY" checked>
                                        <label class="btn btn-outline-info text-start p-3" for="payVNPAY">
                                            <i class="bi bi-qr-code-scan me-2"></i> Chuyển khoản VNPAY
                                        </label>
                                        <input type="radio" class="btn-check" name="paymentMethod" id="payCOD" value="COD">
                                        <label class="btn btn-outline-info text-start p-3" for="payCOD">
                                            <i class="bi bi-cash-stack me-2"></i> Thanh toán khi nhận hàng (COD)
                                        </label>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-confirm" th:disabled="${addresses == null || addresses.isEmpty()}">
                                    XÁC NHẬN ĐẶT HÀNG <i class="bi bi-chevron-right ms-2"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Right Side: Order Summary -->
                <div class="col-lg-5">
                    <div class="checkout-card">
                        <div class="card-header-custom"><i class="bi bi-bag-check me-2"></i> Tóm tắt đơn hàng</div>
                        <div class="card-body p-4">
                            <!-- Cart Items -->
                            <div class="mb-4 overflow-auto" style="max-height: 200px;">
                                <div th:each="item : ${cartList}" class="d-flex align-items-center gap-3 mb-3 pb-3 border-bottom border-secondary">
                                    <img th:src="${item.product.mainImage != null ? '/uploads/' + item.product.mainImage : 'https://via.placeholder.com/60'}" class="cart-item-img">
                                    <div class="flex-grow-1">
                                        <div class="fw-bold small text-white text-truncate" style="max-width: 150px;" th:text="${item.product.name}"></div>
                                        <div class="small text-secondary">SL: [[${item.quantity}]]</div>
                                    </div>
                                    <div class="price-text small" th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + '₫'"></div>
                                </div>
                            </div>

                            <!-- Voucher Section -->
                            <div class="p-3 rounded mb-4" style="background: rgba(102, 252, 241, 0.05); border: 1px dashed var(--text-main);">
                                <label class="small fw-bold text-uppercase mb-2 d-block">Mã giảm giá</label>
                                <form action="/checkout" method="get" class="input-group">
                                    <!-- Giữ addressId khi áp dụng voucher -->
                                    <input type="hidden" name="addressId" th:value="${selectedAddressId}" />
                                    <select class="form-select form-select-dark shadow-none" name="voucherCode">
                                        <option value="">-- Chọn Voucher --</option>
                                        <option th:each="v : ${savedVouchers}" th:value="${v.code}" 
                                                th:selected="${voucherCode == v.code}"
                                                th:text="${v.code + ' (Giảm ' + (v.discountPercent != null ? v.discountPercent + '%' : #numbers.formatDecimal(v.discountAmount, 0, 'COMMA', 0, 'POINT') + '₫') + ')'}">
                                        </option>
                                    </select>
                                    <button class="btn btn-info px-3" type="submit">ÁP DỤNG</button>
                                </form>
                                <div th:if="${discount > 0}" class="text-main small mt-2 fw-bold">
                                    <i class="bi bi-patch-check-fill"></i> Đã áp dụng giảm giá!
                                </div>
                            </div>

                            <!-- Totals -->
                            <div class="small pt-2">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-secondary">Tạm tính:</span>
                                    <span th:text="${#numbers.formatDecimal(rawTotal, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                                </div>
                                <div class="d-flex justify-content-between mb-2" th:if="${discount > 0}">
                                    <span class="text-secondary">Giảm giá:</span>
                                    <span class="text-danger fw-bold" th:text="'-' + ${#numbers.formatDecimal(discount, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="text-secondary">Phí vận chuyển:</span>
                                    <span class="text-success fw-bold" th:text="${feeShip == 0 ? 'MIỄN PHÍ' : #numbers.formatDecimal(feeShip, 0, 'COMMA', 0, 'POINT') + '₫'}"></span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center pt-3 border-top border-secondary">
                                    <span class="fw-bold text-white">TỔNG CỘNG:</span>
                                    <span class="price-text fs-4" th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
