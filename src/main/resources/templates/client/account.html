<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hồ sơ cá nhân - MODEL WORLD</title>

<th:block th:if="${_csrf != null}">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</th:block>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
	--bg-body: #0b0c10; --bg-card: #151b22; --bg-nav: #0b0c10;
	--text-main: #66fcf1; --text-light: #c5c6c7; --text-dim: #8892b0;
	--accent-cyan: #45a29e; --border-color: #232d39; --shadow: rgba(0, 0, 0, 0.4);
	--accent-red: #ff2e63; --input-bg: #0b0c10;
}
[data-theme="light"] {
	--bg-body: #f0f2f5; --bg-card: #ffffff; --bg-nav: #ffffff;
	--text-main: #00adb5; --text-light: #222831; --text-dim: #666666;
	--border-color: #e1e4e8; --shadow: rgba(0, 0, 0, 0.08);
	--input-bg: #f8f9fa;
}

body {
	background-color: var(--bg-body); color: var(--text-light);
	font-family: 'Be Vietnam Pro', sans-serif;
	transition: background-color 0.3s, color 0.3s;
	overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column;
}

/* NAVBAR */
.top-navbar { background: var(--bg-nav); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 2000; padding: 10px 0; box-shadow: 0 4px 15px var(--shadow); }
.nav-logo span { font-family: 'Montserrat'; font-weight: 900; color: var(--text-main); font-size: 1.5rem; letter-spacing: 1px;}
.nav-icon-link { color: var(--text-light); font-size: 1.2rem; transition: 0.3s; text-decoration: none; position: relative;}
.nav-icon-link:hover { color: var(--text-main); transform: translateY(-2px);}
.badge-count { position: absolute; top: -6px; right: -8px; background: var(--accent-red); color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 50%; font-weight: 900; border: 2px solid var(--bg-nav);}

/* UI CARDS */
.account-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; box-shadow: 0 8px 30px var(--shadow); height: 100%; }
.section-title { font-family: 'Montserrat'; font-weight: 800; color: var(--text-light); letter-spacing: 0.5px; border-left: 4px solid var(--text-main); padding-left: 12px; margin-bottom: 25px; font-size: 1.15rem; text-transform: uppercase;}

/* AVATAR */
.avatar-section { position: relative; width: 130px; margin: 0 auto 20px; }
.avatar-display { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-card); box-shadow: 0 0 0 3px var(--text-main), 0 8px 15px var(--shadow); transition: 0.3s; cursor: pointer; }
.avatar-display:hover { filter: brightness(0.7); }
.camera-icon { position: absolute; bottom: 0; right: 0; background: var(--text-main); color: #000; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--bg-card); font-size: 1.1rem; pointer-events: none;}

/* STATS WIDGETS */
.stat-box { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; transition: 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100%;}
.stat-box:hover { border-color: var(--text-main); transform: translateY(-3px); box-shadow: 0 5px 15px var(--shadow);}
.stat-title { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--text-dim); margin-bottom: 5px;}
.stat-value { font-size: 1.3rem; font-weight: 900; color: var(--text-light); font-family: 'Montserrat';}

/* RANK TAGS */
.rank-tag { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 800; padding: 6px 20px; border-radius: 50px; display: inline-block; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
.rank-kim-cuong { background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff); background-size: 200% auto; color: #fff !important; animation: shine_diamond 2s linear infinite; box-shadow: 0 4px 10px rgba(0, 210, 255, 0.3); }
.rank-vang { background: linear-gradient(45deg, #f1c40f, #e67e22); color: #000 !important; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); }
.rank-bac { background: linear-gradient(45deg, #bdc3c7, #95a5a6); color: #000 !important; }
.rank-dong { background: linear-gradient(45deg, #cd7f32, #a0522d); color: #fff !important; }
@keyframes shine_diamond { to { background-position:200% center; } }

/* FORMS */
.form-label { color: var(--text-dim); font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; }
.form-control, .form-select { background-color: var(--input-bg) !important; color: var(--text-light) !important; border: 1px solid var(--border-color) !important; border-radius: 10px; padding: 12px 15px; transition: 0.3s; font-size: 0.95rem;}
.form-control:focus, .form-select:focus { border-color: var(--text-main) !important; box-shadow: 0 0 0 3px rgba(102, 252, 241, 0.1); }
.input-group .btn-update { border-radius: 0 10px 10px 0; border: 1px solid var(--text-main); margin-left: -1px; z-index: 5;}
.input-group .form-control, .input-group .input-group-text { border-radius: 10px 0 0 10px; }

/* BUTTONS */
.btn-update { background: var(--text-main); color: #000; font-weight: 800; padding: 10px 25px; border-radius: 10px; transition: 0.3s; border: none; font-size: 0.95rem;}
.btn-update:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 252, 241, 0.3); }

/* ADDRESS CARDS */
.address-card { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; transition: 0.3s; position: relative; overflow: hidden;}
.address-card:hover { border-color: var(--accent-cyan); box-shadow: 0 4px 15px var(--shadow);}
.address-card.is-default { border-color: var(--text-main); background: rgba(102, 252, 241, 0.03);}
.address-card.is-default::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: var(--text-main);}
.badge-default { background: rgba(102, 252, 241, 0.15); color: var(--text-main); border: 1px solid var(--text-main); font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 800;}

.add-address-zone { background: transparent; border: 1px dashed var(--border-color); border-radius: 15px; padding: 25px; transition: 0.3s;}
.add-address-zone:focus-within { border-color: var(--text-main); background: rgba(102, 252, 241, 0.02);}

/* DANGER ZONE */
.danger-zone { background: rgba(255, 46, 99, 0.03); border: 1px solid rgba(255, 46, 99, 0.2); border-radius: 15px; padding: 25px;}
.danger-zone .btn { background: var(--accent-red); color: white; border: none; border-radius: 0 10px 10px 0;}
.danger-zone .btn:hover { background: #e02454;}
.danger-zone .form-control:focus { border-color: var(--accent-red) !important; box-shadow: 0 0 0 3px rgba(255, 46, 99, 0.1); }

footer { background: var(--bg-nav); border-top: 1px solid var(--border-color); padding: 20px 0; margin-top: auto; }
</style>
</head>
<body>

	<nav class="top-navbar">
		<div class="container-fluid px-lg-5 nav-holder">
			<div class="d-flex align-items-center justify-content-between">
				<div class="d-flex align-items-center gap-4">
					<a th:href="@{/}" class="text-decoration-none nav-logo"><span>MODEL WORLD</span></a> 
					<a th:href="@{/products}" class="nav-icon-link d-none d-lg-flex align-items-center gap-2" style="font-size: 0.95rem; font-weight: 700;"> 
						<i class="bi bi-box-seam"></i> SẢN PHẨM
					</a>
				</div>

				<div class="d-flex align-items-center gap-4">
					<div class="theme-toggle nav-icon-link" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></div>
					<a th:href="@{/wishlist}" class="nav-icon-link"><i class="bi bi-heart"></i></a> 
					<a th:href="@{/cart}" class="nav-icon-link position-relative"> 
						<i class="bi bi-cart3"></i> <span class="badge-count" th:text="${cartSize ?: 0}">0</span>
					</a>

					<div class="dropdown">
						<div class="d-flex align-items-center gap-2 cursor-pointer" data-bs-toggle="dropdown" style="cursor: pointer">
							<img th:src="${account.avatar != null ? (account.avatar.startsWith('http') ? account.avatar : '/images/avatar/' + account.avatar) : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="rounded-circle border border-secondary" width="35" height="35" style="object-fit: cover;">
						</div>
						<ul class="dropdown-menu dropdown-menu-end shadow border border-secondary mt-3" style="background: var(--bg-card); font-size: 0.9rem;">
							<li><a class="dropdown-item py-2 fw-bold" style="color: var(--text-main);" th:href="@{/account}"><i class="bi bi-person me-2"></i> Hồ sơ</a></li>
							<li><a class="dropdown-item py-2" style="color: var(--text-light);" th:href="@{/orders}"><i class="bi bi-bag-check me-2"></i> Đơn hàng</a></li>
							<li><hr class="dropdown-divider border-secondary"></li>
							<li><a class="dropdown-item py-2 text-danger fw-bold" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a></li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</nav>

	<div class="container py-5">
		<div class="row g-4">
			
			<!-- ============================================== -->
			<!-- CỘT TRÁI: WIDGET TÓM TẮT THÔNG TIN (GỌN GÀNG)  -->
			<!-- ============================================== -->
			<div class="col-xl-4 col-lg-4">
				<div class="account-card">
					<div class="text-center">
						<!-- Avatar -->
						<form id="avatarForm" th:action="@{/account/upload-avatar}" method="post" enctype="multipart/form-data">
							<div class="avatar-section">
								<label for="avatarInput" title="Thay đổi ảnh đại diện"> 
									<img th:src="${account.avatar != null ? (account.avatar.startsWith('http') ? account.avatar : '/images/avatar/' + account.avatar) : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="avatar-display">
									<div class="camera-icon shadow"><i class="bi bi-camera-fill"></i></div>
								</label> 
								<input type="file" id="avatarInput" name="avatar" accept="image/*" style="display: none" onchange="document.getElementById('avatarForm').submit()">
							</div>
						</form>

						<!-- Thông tin cơ bản -->
						<h5 class="fw-bold mb-1" style="color: var(--text-light);" th:text="${account.fullName ?: account.username}">Họ tên</h5>
						<p class="mb-3 small fw-medium" style="color: var(--text-dim)" th:text="${account.email}">email@example.com</p>

						<!-- Rank -->
						<div class="rank-tag shadow" th:classappend="${membershipName == 'Kim Cương' ? 'rank-kim-cuong' : (membershipName == 'Vàng' ? 'rank-vang' : (membershipName == 'Bạc' ? 'rank-bac' : 'rank-dong'))}" th:text="${membershipName ?: 'Thành viên'}">Hạng</div>
					</div>

					<hr class="my-4" style="border-color: var(--border-color);">

					<!-- Thống kê -->
					<div class="row g-3">
						<div class="col-6">
							<div class="stat-box">
								<div class="stat-title"><i class="bi bi-box-seam text-info me-1"></i> Đơn hàng</div>
								<div class="stat-value" th:text="${orderCount}">0</div>
							</div>
						</div>
						<div class="col-6">
							<div class="stat-box">
								<div class="stat-title"><i class="bi bi-star-fill text-warning me-1"></i> Điểm thưởng</div>
								<div class="stat-value text-warning" th:text="${#numbers.formatDecimal(currentPoints, 0, 'COMMA', 0, 'POINT')}">0</div>
							</div>
						</div>
						<div class="col-12">
							<div class="stat-box flex-row justify-content-between p-3">
								<div class="stat-title mb-0"><i class="bi bi-wallet2 text-success me-1"></i> Tổng chi</div>
								<div class="stat-value text-main fs-5" th:text="${#numbers.formatDecimal(totalSpent, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- ============================================== -->
			<!-- CỘT PHẢI: KHU VỰC CÁC FORM CHỈNH SỬA           -->
			<!-- ============================================== -->
			<div class="col-xl-8 col-lg-8">
				
				<!-- Thông báo Hệ thống -->
				<div th:if="${success}" class="alert alert-success border-success bg-success bg-opacity-10 text-success fw-bold rounded-3 mb-4 py-3">
					<i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
				</div>
				<div th:if="${error}" class="alert alert-danger border-danger bg-danger bg-opacity-10 text-danger fw-bold rounded-3 mb-4 py-3">
					<i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
				</div>

				<div class="account-card">
                    
					<!-- PHẦN 1: THÔNG TIN CÁ NHÂN -->
					<h6 class="section-title"><i class="bi bi-person-lines-fill me-2 text-main"></i> THÔNG TIN CÁ NHÂN</h6>
					<div class="row g-4 mb-4">
						<div class="col-md-6">
							<form th:action="@{/account/update-fullname}" method="post">
								<label class="form-label">Họ và tên hiển thị</label>
								<div class="input-group">
									<span class="input-group-text border-end-0 bg-transparent" style="border-color: var(--border-color); color: var(--text-dim);"><i class="bi bi-person"></i></span>
									<input type="text" name="fullName" class="form-control border-start-0 ps-0" th:value="${account.fullName}" placeholder="Nhập họ tên...">
									<button class="btn btn-update">LƯU</button>
								</div>
							</form>
						</div>
						<div class="col-md-6">
							<form th:action="@{/account/update-phone}" method="post">
								<label class="form-label">Số điện thoại liên lạc</label>
								<div class="input-group">
									<span class="input-group-text border-end-0 bg-transparent" style="border-color: var(--border-color); color: var(--text-dim);"><i class="bi bi-telephone"></i></span>
									<input type="tel" name="phone" class="form-control border-start-0 ps-0" th:value="${account.phone}" placeholder="Nhập số điện thoại...">
									<button class="btn btn-update">LƯU</button>
								</div>
							</form>
						</div>
					</div>

                    <hr class="my-5" style="border-color: var(--border-color); opacity: 1;">

					<!-- PHẦN 2: SỔ ĐỊA CHỈ -->
					<div class="d-flex justify-content-between align-items-center mb-4">
						<h6 class="section-title mb-0"><i class="bi bi-geo-alt-fill me-2 text-main"></i> SỔ ĐỊA CHỈ GIAO HÀNG</h6>
						<button class="btn btn-sm btn-outline-info rounded-pill fw-bold px-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAddAddress">
							<i class="bi bi-plus-lg me-1"></i> Thêm địa chỉ mới
						</button>
					</div>

					<!-- Danh sách địa chỉ đã lưu -->
                    <div th:if="${addresses != null and !addresses.isEmpty()}" class="row g-3 mb-4">
                        <div th:each="addr : ${addresses}" class="col-md-6">
							<div class="address-card h-100 d-flex flex-column" th:classappend="${addr.isDefault} ? 'is-default' : ''">
								<div class="d-flex justify-content-between align-items-start mb-2">
									<div class="fw-bold" style="color: var(--text-light); font-size: 1rem;"><i class="bi bi-person me-1 text-dim"></i> <span th:text="${addr.recipientName}"></span></div>
									<span th:if="${addr.isDefault}" class="badge-default"><i class="bi bi-check2-circle"></i> Mặc định</span>
								</div>
								<div class="small fw-medium mb-2" style="color: var(--text-dim);"><i class="bi bi-telephone me-1"></i> <span th:text="${addr.recipientPhone}"></span></div>
								<div class="small lh-base mb-3 flex-grow-1" style="color: var(--text-light);"><i class="bi bi-geo me-1 text-dim"></i> <span th:text="${addr.fullAddress}"></span></div>
								
								<div class="d-flex gap-2 mt-auto pt-3 border-top" style="border-color: var(--border-color) !important;">
									<form th:if="${!addr.isDefault}" th:action="@{/account/set-default}" method="post" class="flex-grow-1">
										<input type="hidden" name="id" th:value="${addr.id}">
										<button class="btn btn-sm btn-outline-info w-100 fw-bold rounded-2 py-2" style="font-size: 0.85rem;">Đặt mặc định</button>
									</form>
									<form th:action="@{/account/delete-address}" method="post" th:classappend="${addr.isDefault} ? 'w-100' : ''">
										<input type="hidden" name="id" th:value="${addr.id}">
										<button class="btn btn-sm btn-outline-danger rounded-2 py-2 w-100" title="Xóa địa chỉ"><i class="bi bi-trash3"></i> Xóa</button>
									</form>
								</div>
							</div>
                        </div>
                    </div>

					<!-- Form Thêm Địa ChMới (Ẩn/Hiện) -->
					<div class="collapse" id="collapseAddAddress">
						<div class="add-address-zone mt-2 shadow-sm">
							<h6 class="fw-bold mb-3" style="color: var(--text-light);"><i class="bi bi-pencil-square me-2 text-main"></i> Thông tin người nhận mới</h6>
<form th:action="@{/account/add-address}" method="post" accept-charset="UTF-8">								<div class="row g-3">
									<div class="col-md-6">
										<label class="form-label">Tên người nhận</label>
										<input type="text" name="recipientName" class="form-control" placeholder="Ví dụ: Nguyễn Văn A" required>
									</div>
									<div class="col-md-6">
										<label class="form-label">Số điện thoại</label>
										<input type="text" name="recipientPhone" class="form-control" placeholder="09xxxxxxx" required>
									</div>
									<div class="col-md-4">
										<label class="form-label">Tỉnh / Thành phố</label>
										<select id="province" name="province" class="form-select" required>
											<option value="" selected disabled>-- Chọn Tỉnh --</option>
										</select>
									</div>
									<div class="col-md-4">
										<label class="form-label">Quận / Huyện</label>
										<select id="district" name="district" class="form-select" required>
											<option value="" selected disabled>-- Chọn Quận --</option>
										</select>
									</div>
									<div class="col-md-4">
										<label class="form-label">Phường / Xã</label>
										<select id="ward" name="ward" class="form-select">
											<option value="" selected disabled>-- Chọn Phường --</option>
										</select>
									</div>
									<div class="col-12">
										<label class="form-label">Địa chỉ chi tiết</label>
										<input type="text" name="detail" class="form-control" placeholder="Số nhà, ngõ, tên đường..." required>
									</div>
									<div class="col-12 mt-4 text-end">
										<button type="button" class="btn btn-outline-secondary px-4 me-2" data-bs-toggle="collapse" data-bs-target="#collapseAddAddress">Hủy</button>
										<button type="submit" class="btn btn-update px-4"><i class="bi bi-save me-1"></i> LƯU ĐỊA CHỈ</button>
									</div>
								</div>
							</form>
						</div>
					</div>

                    <hr class="my-5" style="border-color: var(--border-color); opacity: 1;">

					<!-- PHẦN 3: BẢO MẬT & ĐỔI MẬT KHẨU -->
					<div class="danger-zone">
						<h6 class="section-title border-danger text-danger mb-4"><i class="bi bi-shield-lock-fill me-2"></i> BẢO MẬT TÀI KHOẢN</h6>
						<form th:action="@{/account/update-password}" method="post">
							<label class="form-label text-danger fw-bold">Cập nhật mật khẩu mới</label>
							<div class="input-group">
								<span class="input-group-text bg-transparent border-danger text-danger border-end-0" style="border-radius: 10px 0 0 10px;"><i class="bi bi-key"></i></span>
								<input type="password" name="password" class="form-control border-danger border-start-0 ps-0 text-danger" placeholder="Nhập mật khẩu an toàn mới..." required minlength="6">
								<button class="btn px-4 fw-bold">ĐỔI MẬT KHẨU</button>
							</div>
						</form>
					</div>

				</div> <!-- End Card Tổng -->
			</div>
		</div>
	</div>

	<footer class="text-center">
		<p class="text-dim small fw-medium mb-0">© 2026 MODEL WORLD - THE ULTIMATE HOBBY STORE</p>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
	<!-- SCRIPT QUẢN LÝ THEME & ĐỊA CHỈ API -->
	<script>
        // 1. Quản lý Theme (Dark/Light Mode)
        function toggleTheme() {
            const h = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const isDark = h.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            h.setAttribute('data-theme', newTheme);
            icon.className = newTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            localStorage.setItem('theme', newTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('themeIcon');
            if(icon) icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            
            // 2. Tích hợp API Tỉnh/Quận/Phường (Đã gộp và tối ưu)
            const provinceSelect = document.getElementById("province");
            const districtSelect = document.getElementById("district");
            const wardSelect = document.getElementById("ward");

            // Lấy danh sách Tỉnh/Thành
            fetch("https://provinces.open-api.vn/api/?depth=1")
                .then(res => res.json())
                .then(data => {
                    data.forEach(p => {
                        provinceSelect.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                    });
                })
                .catch(err => console.error("Lỗi lấy dữ liệu tỉnh:", err));

            // Khi chọn Tỉnh -> Load Quận/Huyện
            provinceSelect.addEventListener("change", () => {
                const provinceName = provinceSelect.value;
                districtSelect.innerHTML = `<option value="" selected disabled>-- Chọn Quận --</option>`;
                wardSelect.innerHTML = `<option value="" selected disabled>-- Chọn Phường --</option>`;

                fetch("https://provinces.open-api.vn/api/?depth=2")
                    .then(res => res.json())
                    .then(data => {
                        const province = data.find(p => p.name === provinceName);
                        if (!province) return;
                        province.districts.forEach(d => {
                            districtSelect.innerHTML += `<option value="${d.name}">${d.name}</option>`;
                        });
                    });
            });

            // Khi chọn Quận -> Load Phường/Xã
            districtSelect.addEventListener("change", () => {
                const provinceName = provinceSelect.value;
                const districtName = districtSelect.value;
                wardSelect.innerHTML = `<option value="" selected disabled>-- Chọn Phường --</option>`;

                fetch("https://provinces.open-api.vn/api/?depth=3")
                    .then(res => res.json())
                    .then(data => {
                        const province = data.find(p => p.name === provinceName);
                        if (!province) return;
                        const district = province.districts.find(d => d.name === districtName);
                        if (!district) return;
                        district.wards.forEach(w => {
                            wardSelect.innerHTML += `<option value="${w.name}">${w.name}</option>`;
                        });
                    });
            });
        });
	</script>

</body>
</html>
