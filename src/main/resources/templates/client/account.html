<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hồ sơ cá nhân - MODEL WORLD</title>

<th:block th:if="${_csrf != null}">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</th:block>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
	--bg-body: #0b0c10; --bg-card: #151b22; --bg-nav: #0b0c10;
	--text-main: #66fcf1; --text-light: #c5c6c7; --text-dim: #8892b0;
	--accent-cyan: #45a29e; --border-color: #232d39; --shadow: rgba(0, 0, 0, 0.4);
	--accent-red: #ff2e63; --input-bg: #0b0c10;
}
[data-theme="light"] {
	--bg-body: #f0f2f5; --bg-card: #ffffff; --bg-nav: #ffffff;
	--text-main: #00adb5; --text-light: #222831; --text-dim: #666666;
	--border-color: #e1e4e8; --shadow: rgba(0, 0, 0, 0.08);
	--input-bg: #f8f9fa;
}

body {
	background-color: var(--bg-body); color: var(--text-light);
	font-family: 'Be Vietnam Pro', sans-serif;
	transition: background-color 0.3s, color 0.3s;
	overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column;
}

/* NAVBAR */
.top-navbar { background: var(--bg-nav); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 2000; padding: 10px 0; box-shadow: 0 4px 15px var(--shadow); }
.nav-logo span { font-family: 'Montserrat'; font-weight: 900; color: var(--text-main); font-size: 1.5rem; letter-spacing: 1px;}
.nav-icon-link { color: var(--text-light); font-size: 1.2rem; transition: 0.3s; text-decoration: none; position: relative;}
.nav-icon-link:hover { color: var(--text-main); transform: translateY(-2px);}
.badge-count { position: absolute; top: -6px; right: -8px; background: var(--accent-red); color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 50%; font-weight: 900; border: 2px solid var(--bg-nav);}

/* UI CARDS */
.account-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; box-shadow: 0 8px 30px var(--shadow); height: 100%; }
.section-title { font-family: 'Montserrat'; font-weight: 800; color: var(--text-light); letter-spacing: 0.5px; border-left: 4px solid var(--text-main); padding-left: 10px; margin-bottom: 20px; font-size: 1.1rem;}

/* AVATAR */
.avatar-section { position: relative; width: 120px; margin: 0 auto 15px; }
.avatar-display { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-card); box-shadow: 0 0 0 3px var(--text-main), 0 8px 15px var(--shadow); transition: 0.3s; cursor: pointer; }
.avatar-display:hover { filter: brightness(0.7); }
.camera-icon { position: absolute; bottom: 0; right: 0; background: var(--text-main); color: #000; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--bg-card); font-size: 1rem; pointer-events: none;}

/* STATS WIDGETS */
.stat-box { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; transition: 0.3s; height: 100%; display: flex; flex-direction: column; justify-content: center;}
.stat-box:hover { border-color: var(--text-main); transform: translateY(-2px);}
.stat-title { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--text-dim); margin-bottom: 5px;}
.stat-value { font-size: 1.2rem; font-weight: 900; color: var(--text-light); font-family: 'Montserrat';}

/* RANK TAGS */
.rank-tag { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 800; padding: 5px 15px; border-radius: 50px; display: inline-block; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
.rank-kim-cuong { background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff); background-size: 200% auto; color: #fff !important; animation: shine_diamond 2s linear infinite; box-shadow: 0 4px 10px rgba(0, 210, 255, 0.3); }
.rank-vang { background: linear-gradient(45deg, #f1c40f, #e67e22); color: #000 !important; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); }
.rank-bac { background: linear-gradient(45deg, #bdc3c7, #95a5a6); color: #000 !important; }
.rank-dong { background: linear-gradient(45deg, #cd7f32, #a0522d); color: #fff !important; }
@keyframes shine_diamond { to { background-position:200% center; } }

/* FORMS */
.form-label { color: var(--text-dim); font-weight: 600; font-size: 0.8rem; margin-bottom: 5px; }
.form-control, .form-select { background-color: var(--input-bg) !important; color: var(--text-light) !important; border: 1px solid var(--border-color) !important; border-radius: 10px; padding: 10px 15px; transition: 0.3s; font-size: 0.9rem;}
.form-control:focus, .form-select:focus { border-color: var(--text-main) !important; box-shadow: 0 0 0 3px rgba(102, 252, 241, 0.1); }
.input-group .btn-update { border-radius: 0 10px 10px 0; border: 1px solid var(--text-main); margin-left: -1px; z-index: 5;}
.input-group .form-control { border-radius: 10px 0 0 10px; border-right: none !important;}

/* BUTTONS */
.btn-update { background: var(--text-main); color: #000; font-weight: 800; padding: 10px 20px; border-radius: 10px; transition: 0.3s; border: none; font-size: 0.9rem;}
.btn-update:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 252, 241, 0.3); }

/* ADDRESS CARDS */
.address-card { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; transition: 0.3s; position: relative; overflow: hidden;}
.address-card:hover { border-color: var(--accent-cyan); box-shadow: 0 4px 15px var(--shadow);}
.address-card.is-default { border-color: var(--text-main); background: rgba(102, 252, 241, 0.02);}
.address-card.is-default::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--text-main);}
.badge-default { background: rgba(102, 252, 241, 0.1); color: var(--text-main); border: 1px solid var(--text-main); font-size: 0.65rem; padding: 3px 8px; border-radius: 50px; font-weight: 700;}

.add-address-zone { background: transparent; border: 1px dashed var(--border-color); border-radius: 15px; padding: 20px; transition: 0.3s;}
.add-address-zone:focus-within { border-color: var(--text-main); background: rgba(102, 252, 241, 0.02);}

/* DANGER ZONE */
.danger-zone { background: rgba(255, 46, 99, 0.03); border: 1px solid rgba(255, 46, 99, 0.2); border-radius: 15px; padding: 25px;}
.danger-zone .btn { background: var(--accent-red); color: white; border: none; border-radius: 0 10px 10px 0;}
.danger-zone .btn:hover { background: #e02454;}
.danger-zone .form-control:focus { border-color: var(--accent-red) !important; box-shadow: 0 0 0 3px rgba(255, 46, 99, 0.1); }

footer { background: var(--bg-nav); border-top: 1px solid var(--border-color); padding: 20px 0; margin-top: auto; }
</style>
</head>
<body>

	<nav class="top-navbar">
		<div class="container-fluid px-lg-5 nav-holder">
			<div class="d-flex align-items-center justify-content-between">
				<div class="d-flex align-items-center gap-4">
					<a th:href="@{/}" class="text-decoration-none nav-logo"><span>MODEL WORLD</span></a> 
					<a th:href="@{/products}" class="nav-icon-link d-none d-lg-flex align-items-center gap-2" style="font-size: 0.95rem; font-weight: 700;"> 
						<i class="bi bi-box-seam"></i> SẢN PHẨM
					</a>
				</div>

				<div class="d-flex align-items-center gap-4">
					<div class="theme-toggle nav-icon-link" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></div>
					<a th:href="@{/wishlist}" class="nav-icon-link"><i class="bi bi-heart"></i></a> 
					<a th:href="@{/cart}" class="nav-icon-link position-relative"> 
						<i class="bi bi-cart3"></i> <span class="badge-count" th:text="${cartSize ?: 0}">0</span>
					</a>

					<div class="dropdown">
						<div class="d-flex align-items-center gap-2 cursor-pointer" data-bs-toggle="dropdown" style="cursor: pointer">
							<img th:src="${account.avatar != null ? (account.avatar.startsWith('http') ? account.avatar : '/images/avatar/' + account.avatar) : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="rounded-circle border border-secondary" width="35" height="35" style="object-fit: cover;">
						</div>
						<ul class="dropdown-menu dropdown-menu-end shadow border border-secondary mt-3" style="background: var(--bg-card); font-size: 0.9rem;">
							<li><a class="dropdown-item py-2 fw-bold" style="color: var(--text-main);" th:href="@{/account}"><i class="bi bi-person me-2"></i> Hồ sơ</a></li>
							<li><a class="dropdown-item py-2" style="color: var(--text-light);" th:href="@{/orders}"><i class="bi bi-bag-check me-2"></i> Đơn hàng</a></li>
							<li><hr class="dropdown-divider border-secondary"></li>
							<li><a class="dropdown-item py-2 text-danger fw-bold" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a></li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</nav>

	<div class="container py-4">
		<div class="row g-4">
			
			<!-- CỘT TRÁI: PROFILE WIDGET -->
			<div class="col-xl-4 col-lg-4">
				<div class="account-card text-center">
					<form id="avatarForm" th:action="@{/account/upload-avatar}" method="post" enctype="multipart/form-data">
						<div class="avatar-section">
							<label for="avatarInput" title="Thay đổi ảnh đại diện"> 
								<img th:src="${account.avatar != null ? (account.avatar.startsWith('http') ? account.avatar : '/images/avatar/' + account.avatar) : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="avatar-display">
								<div class="camera-icon shadow"><i class="bi bi-camera-fill"></i></div>
							</label> 
							<input type="file" id="avatarInput" name="avatar" accept="image/*" style="display: none" onchange="document.getElementById('avatarForm').submit()">
						</div>
					</form>

					<h5 class="fw-bold mb-1" style="color: var(--text-light);" th:text="${account.fullName ?: account.username}">Họ tên</h5>
					<p class="mb-3 small fw-medium" style="color: var(--text-dim)" th:text="${account.email}">email@example.com</p>

					<div class="rank-tag shadow" th:classappend="${membershipName == 'Kim Cương' ? 'rank-kim-cuong' : (membershipName == 'Vàng' ? 'rank-vang' : (membershipName == 'Bạc' ? 'rank-bac' : 'rank-dong'))}" th:text="${membershipName ?: 'Thành viên'}">Hạng</div>

					<!-- THỐNG KÊ -->
					<div class="row g-2 mt-1">
						<div class="col-6">
							<div class="stat-box">
								<div class="stat-title"><i class="bi bi-box-seam text-info me-1"></i> Đơn hàng</div>
								<div class="stat-value" th:text="${orderCount}">0</div>
							</div>
						</div>
						<div class="col-6">
							<div class="stat-box">
								<div class="stat-title"><i class="bi bi-star-fill text-warning me-1"></i> Điểm thưởng</div>
								<div class="stat-value text-warning" th:text="${#numbers.formatDecimal(currentPoints, 0, 'COMMA', 0, 'POINT')}">0</div>
							</div>
						</div>
						<div class="col-12">
							<div class="stat-box flex-row align-items-center justify-content-between p-3">
								<div class="stat-title mb-0"><i class="bi bi-wallet2 text-success me-1"></i> TỔNG CHI</div>
								<div class="stat-value text-main fs-5" th:text="${#numbers.formatDecimal(totalSpent, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- CỘT PHẢI: GỘP TẤT CẢ VÀO 1 CARD LỚN -->
			<div class="col-xl-8 col-lg-8">
				
				<!-- Thông báo -->
				<div th:if="${success}" class="alert alert-success border-success bg-success bg-opacity-10 text-success fw-bold rounded-3 mb-3 py-2">
					<i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
				</div>
				<div th:if="${error}" class="alert alert-danger border-danger bg-danger bg-opacity-10 text-danger fw-bold rounded-3 mb-3 py-2">
					<i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
				</div>

				<!-- CARD TỔNG BAO GỒM 3 PHẦN -->
				<div class="account-card">
                    
					<!-- PHẦN 1: THÔNG TIN CÁ NHÂN -->
					<h6 class="section-title"><i class="bi bi-person-lines-fill me-2 text-main"></i> THÔNG TIN CÁ NHÂN</h6>
					<div class="row g-3">
						<div class="col-md-6">
							<form th:action="@{/account/update-fullname}" method="post">
								<label class="form-label">Họ và tên hiển thị</label>
								<div class="input-group">
									<span class="input-group-text border-end-0 bg-transparent" style="border-color: var(--border-color); color: var(--text-dim); border-radius: 10px 0 0 10px;"><i class="bi bi-person"></i></span>
									<input type="text" name="fullName" class="form-control border-start-0 ps-0" th:value="${account.fullName}" placeholder="Nhập họ tên...">
									<button class="btn btn-update">LƯU</button>
								</div>
							</form>
						</div>
						<div class="col-md-6">
							<form th:action="@{/account/update-phone}" method="post">
								<label class="form-label">Số điện thoại liên lạc</label>
								<div class="input-group">
									<span class="input-group-text border-end-0 bg-transparent" style="border-color: var(--border-color); color: var(--text-dim); border-radius: 10px 0 0 10px;"><i class="bi bi-telephone"></i></span>
									<input type="tel" name="phone" class="form-control border-start-0 ps-0" th:value="${account.phone}" placeholder="Nhập số điện thoại...">
									<button class="btn btn-update">LƯU</button>
								</div>
							</form>
						</div>
					</div>

                    <!-- Đường phân cách -->
                    <hr class="my-5" style="border-color: var(--border-color); opacity: 1;">

					<!-- PHẦN 2: SỔ ĐỊA CHỈ -->
					<div class="d-flex justify-content-between align-items-center mb-3">
						<h6 class="section-title mb-0"><i class="bi bi-geo-alt-fill me-2 text-main"></i> SỔ ĐỊA CHỈ</h6>
						<button class="btn btn-sm btn-outline-info rounded-pill fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAddAddress">
							<i class="bi bi-plus-lg"></i> Thêm mới
						</button>
					</div>

                    <div th:if="${addresses != null and !addresses.isEmpty()}" class="row g-2 mb-3">
                        <div th:each="addr : ${addresses}" class="col-md-6">
							<div class="address-card h-100" th:classappend="${addr.isDefault} ? 'is-default' : ''">
								<div class="d-flex justify-content-between mb-1">
									<div class="fw-bold" style="color: var(--text-light); font-size: 0.95rem;"><i class="bi bi-person me-1 text-dim"></i> <span th:text="${addr.recipientName}"></span></div>
									<span th:if="${addr.isDefault}" class="badge-default"><i class="bi bi-check2-circle"></i> Mặc định</span>
								</div>
								<div class="small fw-medium mb-1" style="color: var(--text-dim);"><i class="bi bi-telephone me-1"></i> <span th:text="${addr.recipientPhone}"></span></div>
								<div class="small lh-base mb-2" style="color: var(--text-light);"><i class="bi bi-geo me-1 text-dim"></i> <span th:text="${addr.fullAddress}"></span></div>
								
								<div class="d-flex gap-2 mt-auto pt-2 border-top" style="border-color: var(--border-color) !important;">
									<form th:if="${!addr.isDefault}" th:action="@{/account/set-default}" method="post" class="flex-grow-1">
										<input type="hidden" name="id" th:value="${addr.id}">
										<button class="btn btn-sm btn-outline-info w-100 fw-bold rounded-2 py-1" style="font-size: 0.8rem;">Mặc định</button>
									</form>
									<form th:action="@{/account/delete-address}" method="post">
										<input type="hidden" name="id" th:value="${addr.id}">
										<button class="btn btn-sm btn-outline-danger rounded-2 px-3 py-1" title="Xóa"><i class="bi bi-trash3"></i></button>
									</form>
								</div>
							</div>
                        </div>
                    </div>

					<div class="collapse" id="collapseAddAddress">
						<div class="add-address-zone mt-2 shadow-sm">
							<h6 class="fw-bold mb-3 small" style="color: var(--text-light);"><i class="bi bi-pencil-square me-2 text-main"></i> Nhập thông tin địa chỉ mới</h6>
							<form th:action="@{/account/add-address}" method="post">
								<div class="row g-2">
									<div class="col-md-6">
										<label class="form-label">Tên người nhận</label>
										<input type="text" name="recipientName" class="form-control form-control-sm" placeholder="Nguyễn Văn A" required>
									</div>
									<div class="col-md-6">
										<label class="form-label">Số điện thoại</label>
										<input type="text" name="recipientPhone" class="form-control form-control-sm" placeholder="09xxxxxxx" required>
									</div>
									<div class="col-md-6">
										<label class="form-label">Tỉnh / Thành phố</label>
										<select id="provinceSelect" class="form-select form-select-sm" required>
											<option value="" selected disabled>Chọn Tỉnh/Thành</option>
										</select>
										<input type="hidden" name="province" id="provinceName">
									</div>
									<div class="col-md-6">
										<label class="form-label">Quận / Huyện</label>
										<select id="districtSelect" class="form-select form-select-sm" required disabled>
											<option value="" selected disabled>Chọn Quận/Huyện</option>
										</select>
										<input type="hidden" name="district" id="districtName">
									</div>
									<div class="col-12">
										<label class="form-label">Địa chỉ chi tiết</label>
										<input type="text" name="detail" class="form-control form-control-sm" placeholder="Số nhà, ngõ, tên đường, phường/xã..." required>
									</div>
									<div class="col-12 mt-3 text-end">
										<button class="btn btn-update py-2 px-4"><i class="bi bi-save me-1"></i> LƯU</button>
									</div>
								</div>
							</form>
						</div>
					</div>

                    <!-- Đường phân cách -->
                    <hr class="my-5" style="border-color: var(--border-color); opacity: 1;">

					<!-- PHẦN 3: ĐỔI MẬT KHẨU -->
					<div class="danger-zone">
						<h6 class="section-title border-danger text-danger mb-3"><i class="bi bi-shield-lock-fill me-2"></i> BẢO MẬT TÀI KHOẢN</h6>
						<form th:action="@{/account/update-password}" method="post">
							<label class="form-label text-danger fw-bold">Cập nhật mật khẩu mới</label>
							<div class="input-group">
								<span class="input-group-text bg-transparent border-danger text-danger border-end-0" style="border-radius: 10px 0 0 10px;"><i class="bi bi-key"></i></span>
								<input type="password" name="password" class="form-control border-danger border-start-0 ps-0 text-danger" placeholder="Nhập mật khẩu an toàn..." required minlength="6">
								<button class="btn px-4 fw-bold">CẬP NHẬT</button>
							</div>
						</form>
					</div>

				</div> <!-- End Card Tổng -->
			</div>
		</div>
	</div>

	<footer class="text-center">
		<p class="text-dim small fw-medium mb-0">© 2026 MODEL WORLD - THE ULTIMATE HOBBY STORE</p>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
	<!-- SCRIPT QUẢN LÝ THEME & ĐỊA CHỈ API -->
	<script>
        function toggleTheme() {
            const h = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const isDark = h.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            h.setAttribute('data-theme', newTheme);
            icon.className = newTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            localStorage.setItem('theme', newTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('themeIcon');
            if(icon) icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            
            // API Địa chỉ
            const provinceSelect = document.getElementById("provinceSelect");
            const districtSelect = document.getElementById("districtSelect");
            const provinceNameInput = document.getElementById("provinceName");
            const districtNameInput = document.getElementById("districtName");

            fetch("https://provinces.open-api.vn/api/p/")
                .then(response => response.json())
                .then(data => {
                    data.forEach(province => {
                        let option = document.createElement("option");
                        option.value = province.code; 
                        option.text = province.name;  
                        provinceSelect.add(option);
                    });
                }).catch(err => console.error(err));

            provinceSelect.addEventListener("change", function() {
                provinceNameInput.value = this.options[this.selectedIndex].text;
                districtSelect.innerHTML = '<option value="" selected disabled>Chọn Quận/Huyện</option>';
                districtSelect.disabled = false;
                districtNameInput.value = ""; 
                
                fetch(`https://provinces.open-api.vn/api/p/${this.value}?depth=2`)
                    .then(response => response.json())
                    .then(data => {
                        data.districts.forEach(district => {
                            let option = document.createElement("option");
                            option.value = district.code;
                            option.text = district.name;
                            districtSelect.add(option);
                        });
                    }).catch(err => console.error(err));
            });

            districtSelect.addEventListener("change", function() {
                districtNameInput.value = this.options[this.selectedIndex].text;
            });
        });
    </script>
</body>
</html>
