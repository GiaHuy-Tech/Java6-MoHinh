<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu thích - Model World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050b14;
            --bg-card: #0c1525;
            --text-light: #e1e7ff;
            --accent-cyan: #00f2ff;
            --accent-red: #ff4d4d;
            --border-color: rgba(0, 242, 255, 0.2);
            --font-main: "Be Vietnam Pro", sans-serif;
            --font-logo: "Orbitron", sans-serif;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            font-family: var(--font-main); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0;
        }

        .navbar { 
            background-color: rgba(12, 21, 37, 0.95); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border-color); 
            padding: 1rem 0; 
        }
        .navbar-brand { font-family: var(--font-logo); text-transform: uppercase; letter-spacing: 1px; color: #fff !important; }
        .navbar-brand i { color: var(--accent-cyan) !important; }
        .nav-link { color: #aab8c5 !important; transition: 0.3s; font-weight: 500; }
        .nav-link:hover, .nav-link.active { color: var(--accent-cyan) !important; text-shadow: 0 0 8px var(--accent-cyan); }

        .product-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        .product-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.15);
        }
        .product-img-box {
            background-color: #fff; /* Đổi sang nền trắng để nổi bật mô hình */
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 220px;
        }
        .product-thumb {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            transition: transform 0.3s;
        }
        .product-name-link {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8rem;
            transition: 0.3s;
        }
        .product-name-link:hover { color: var(--accent-cyan); }
        .price-text { color: var(--accent-red); font-weight: 700; font-size: 1.1rem; }
        .date-text { font-size: 0.75rem; color: #6c757d; }

        .btn-remove-card {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            z-index: 10;
            transition: 0.3s;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-remove-card:hover {
            background-color: var(--accent-red);
            color: #fff;
            transform: scale(1.1);
        }
        .btn-cart { 
            color: var(--accent-cyan); 
            border: 1px solid var(--accent-cyan); 
            background: transparent; 
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-cart:hover { 
            background: var(--accent-cyan); 
            color: #000; 
        }

        .empty-state-icon { font-size: 5rem; color: rgba(0, 242, 255, 0.1); }
        footer { background: #020408; border-top: 1px solid var(--border-color); padding: 40px 0; margin-top: auto; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <i class="bi bi-box-seam-fill fs-3"></i>
            <span class="fw-bold fs-4">MODEL WORLD</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a class="nav-link" th:href="@{/products}">Sản phẩm</a>
            <a class="nav-link" th:href="@{/cart}"><i class="bi bi-cart3"></i></a>
            <a class="nav-link active" th:href="@{/wishlist}"><i class="bi bi-heart-fill text-danger"></i></a>
            <a class="nav-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>
</nav>

<section class="py-5 flex-grow-1">
    <div class="container">
        <div class="mb-5">
            <h2 class="text-white fw-bold">DANH SÁCH <span class="text-info">YÊU THÍCH</span></h2>
            <p class="text-secondary">Lưu trữ những mô hình bạn đang quan tâm</p>
        </div>

        <div th:if="${message != null}" class="alert alert-success bg-dark border-info text-info alert-dismissible fade show mb-4">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${not #lists.isEmpty(likes)}" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-4">
            <div class="col" th:each="like : ${likes}">
                <div class="product-card h-100 d-flex flex-column" th:if="${like.product != null}">
                    
                    <a th:href="@{'/wishlist/remove/' + ${like.id}}" class="btn-remove-card" 
                       onclick="return confirm('Xóa khỏi danh sách yêu thích?')" title="Xóa">
                        <i class="bi bi-x-lg"></i>
                    </a>

                    <a th:href="@{'/product-detail/' + ${like.product.id}}" class="product-img-box">
                        <img th:src="${like.product.mainImage}" class="product-thumb" alt="Product">
                    </a>

                    <div class="p-3 d-flex flex-column flex-grow-1">
                        <div class="date-text mb-2">
                            <i class="bi bi-clock me-1"></i>
                            <span th:text="${like.likedAt != null ? #dates.format(like.likedAt, 'dd/MM/yyyy') : 'Gần đây'}"></span>
                        </div>
                        
                        <a th:href="@{'/product-detail/' + ${like.product.id}}" class="product-name-link mb-2" th:text="${like.product.name}"></a>
                        
                        <div class="price-text mb-3 mt-auto" th:text="${#numbers.formatDecimal(like.product.price ?: 0, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                        
                        <form th:action="@{'/cart/add/' + ${like.product.id}}" method="post">
                            <button type="submit" class="btn btn-cart w-100 rounded-pill py-2">
                                <i class="bi bi-cart-plus me-1"></i> GIỎ HÀNG
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(likes)}" class="text-center py-5">
            <div class="empty-state-icon mb-4">
                <i class="bi bi-heartbreak"></i>
            </div>
            <h4 class="text-white">Danh sách trống</h4>
            <p class="text-secondary">Hãy quay lại cửa hàng để chọn mô hình ưng ý nhất.</p>
            <a th:href="@{/products}" class="btn btn-info rounded-pill px-5 py-2 fw-bold mt-3">MUA SẮM NGAY</a>
        </div>
    </div>
</section>

<footer class="text-center">
    <div class="container text-secondary small">
        <p class="mb-0">&copy; 2026 Model World. Premium Hobby Store.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
