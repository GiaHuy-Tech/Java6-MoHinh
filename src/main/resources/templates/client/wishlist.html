<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh sách yêu thích - MODEL WORLD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* COPY NGUYÊN BẢN HỆ BIẾN TỪ INDEX */
        :root {
            --bg-body: #0b0c10; --bg-card: #1f2833; --bg-nav: #0b0c10;
            --text-main: #66fcf1; --text-light: #c5c6c7; --accent-cyan: #45a29e; 
            --border-color: #2d3238; --shadow: rgba(0,0,0,0.5); --card-hover: #232d39;
            --accent-red: #ff2e63;
        }
        [data-theme="light"] {
            --bg-body: #f8f9fa; --bg-card: #ffffff; --bg-nav: #ffffff;
            --text-main: #00adb5; --text-light: #222831; --accent-cyan: #393e46; 
            --border-color: #dee2e6; --shadow: rgba(0,0,0,0.1); --card-hover: #f1f3f5;
        }
        
        body { background-color: var(--bg-body); color: var(--text-light); font-family: 'Be Vietnam Pro', sans-serif; transition: 0.3s; min-height: 100vh; display: flex; flex-direction: column; }

        /* NAVBAR STYLE TỪ INDEX */
        .top-navbar { background: var(--bg-nav); border-bottom: 1px solid var(--border-color); position: sticky; top:0; z-index: 2000; padding: 10px 0; box-shadow: 0 2px 10px var(--shadow); }
        .nav-logo span { font-family: 'Montserrat'; font-weight: 900; color: var(--text-main); font-size: 1.7rem; }
        .nav-icon-link { color: var(--text-light); font-size: 1.4rem; transition: 0.3s; position: relative; text-decoration: none; border:none; background:none; cursor: pointer; }
        .nav-icon-link:hover, .nav-icon-link.active { color: var(--text-main); }
        .badge-count { position: absolute; top: -5px; right: -8px; background: #ff4757; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; font-weight: 900; }

        /* SEARCH BAR */
        .search-container { position: relative; max-width: 450px; }
        #liveSearchInput { background-color: var(--bg-card) !important; color: var(--text-light) !important; border-color: var(--border-color); }

        /* PRODUCT CARD - ĐỒNG BỘ Y HỆT GRID TRANG CHỦ */
        .product-card { 
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; 
            overflow: hidden; height: 100%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
        }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 15px 40px var(--shadow); border-color: var(--text-main); }
        
        .product-img-holder { background: #fff; height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 6px; position: relative; overflow: hidden; border: 1px solid #eee; }
        .product-img-holder img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.5s ease; }
        .product-card:hover .product-img-holder img { transform: scale(1.1); }

        .product-info-name { 
            font-size: 1.1rem; font-weight: 700; color: var(--text-light);
            margin-bottom: 12px; height: 50px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
        }
        .product-meta { font-size: 0.9rem; color: var(--text-light); opacity: 0.7; margin-bottom: 5px; }
        .product-price-new { color: #ff2e63; font-weight: 900; font-size: 1.4rem; margin: 15px 0; display: block; }
        
        /* ACTIONS */
        .card-actions { display: flex; gap: 8px; align-items: center; }
        .btn-remove-wish { 
            border: 1px solid var(--border-color); background: var(--bg-body); color: var(--accent-red); 
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; 
            border-radius: 6px; transition: 0.2s; text-decoration: none;
        }
        .btn-remove-wish:hover { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }

        .btn-add-to-cart-icon { 
            flex-grow: 1; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-main); 
            height: 42px; border-radius: 6px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add-to-cart-icon:hover { background: var(--text-main); color: #000; border-color: var(--text-main); }

        footer { background: #020408; border-top: 1px solid var(--border-color); padding: 40px 0; margin-top: auto; }
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="container-fluid px-lg-5">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-4">
                <a th:href="@{/}" class="text-decoration-none nav-logo"><span>MODEL WORLD</span></a>
                <a th:href="@{/products}" class="nav-icon-link d-none d-lg-flex align-items-center gap-2" style="font-size: 1rem; font-weight: 600;"><i class="bi bi-box-seam"></i> SẢN PHẨM</a>
            </div>

            <div class="search-container flex-grow-1 mx-5 d-none d-md-block">
                <form th:action="@{/products}" method="get" class="input-group">
                    <input type="text" name="keyword" id="liveSearchInput" class="form-control rounded-start-pill px-4 py-2" placeholder="Tìm kiếm trong yêu thích...">
                    <button type="submit" class="btn btn-outline-info rounded-end-pill border-secondary border-start-0 bg-dark px-3"><i class="bi bi-search"></i></button>
                </form>
            </div>

            <div class="d-flex align-items-center gap-4">
                <div class="theme-toggle nav-icon-link" onclick="toggleTheme()" style="cursor:pointer;"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></div>
                <a th:href="@{/wishlist}" class="nav-icon-link active"><i class="bi bi-heart-fill"></i></a>
                <a th:href="@{/cart}" class="nav-icon-link position-relative">
                    <i class="bi bi-cart3"></i>
                    <span class="badge-count" th:text="${cartSize ?: 0}">0</span>
                </a>
                
                <div class="dropdown" th:if="${user != null}">
                    <div class="d-flex align-items-center gap-2 cursor-pointer" data-bs-toggle="dropdown">
                        <img th:src="${user.avatar ?: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="rounded-circle border border-info" width="38" height="38" style="object-fit:cover;">
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3">
                        <li><a class="dropdown-item py-2" th:href="@{/profile}"><i class="bi bi-person me-2"></i> Hồ sơ</a></li>
                        <li><a class="dropdown-item py-2 text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a></li>
                    </ul>
                </div>
                <a th:if="${user == null}" th:href="@{/login}" class="btn btn-sm btn-outline-info rounded-pill px-4">Đăng nhập</a>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-lg-5 py-5">
    <div class="d-flex align-items-center justify-content-between mb-5">
        <h3 class="fw-bold text-main border-start border-5 border-info ps-3 mb-0">DANH SÁCH YÊU THÍCH</h3>
        <span class="text-secondary" th:text="${#lists.size(likes) + ' sản phẩm'}"></span>
    </div>

    <div th:if="${message != null}" class="alert alert-info bg-dark border-info text-info mb-4 rounded-3">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}"></span>
    </div>

    <div th:if="${not #lists.isEmpty(likes)}" class="row g-4">
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6" th:each="like : ${likes}">
            <div class="product-card shadow" th:if="${like.product != null}">
                
                <div class="product-img-holder">
                    <a th:href="@{'/product-detail/' + ${like.product.id}}">
                        <img th:src="${like.product.mainImage}" alt="Product">
                    </a>
                </div>
                
                <h6 class="product-info-name" th:text="${like.product.name}">Tên sản phẩm</h6>
                
                <div class="product-meta">
                    <i class="bi bi-tag-fill me-1"></i> Hãng: <span th:text="${like.product.category?.name}">Brand</span>
                </div>
                <div class="product-meta">
                    <i class="bi bi-clock-history me-1"></i> Thêm ngày: <span th:text="${#dates.format(like.likedAt, 'dd/MM/yyyy')}"></span>
                </div>
                
                <span class="product-price-new" th:text="${#numbers.formatDecimal(like.product.price ?: 0, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                
                <div class="card-actions">
                    <a th:href="@{'/wishlist/remove/' + ${like.id}}" class="btn-remove-wish" 
                       onclick="return confirm('Xóa khỏi danh sách yêu thích?')" title="Xóa">
                        <i class="bi bi-trash3-fill"></i>
                    </a>
                    
                    <form th:action="@{'/cart/add/' + ${like.product.id}}" method="post" class="flex-grow-1">
                        <button type="submit" class="btn-add-to-cart-icon w-100">
                            <i class="bi bi-cart-plus"></i> MUA NGAY
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(likes)}" class="text-center py-5">
        <i class="bi bi-heartbreak" style="font-size: 5rem; color: var(--text-main); opacity: 0.2;"></i>
        <h4 class="mt-4 fw-bold">DANH SÁCH TRỐNG</h4>
        <p class="text-secondary">Hãy quay lại cửa hàng để chọn mô hình ưng ý nhất.</p>
        <a th:href="@{/products}" class="btn btn-info rounded-pill px-5 py-2 fw-bold mt-4 shadow-lg">KHÁM PHÁ NGAY</a>
    </div>
</div>

<footer class="text-center py-4 mt-auto">
    <p class="text-white-50 small mb-0">© 2026 MODEL WORLD - THE ULTIMATE HOBBY STORE</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Đồng bộ Theme Toggle từ Index
    function toggleTheme() {
        const h = document.documentElement;
        const icon = document.getElementById('themeIcon');
        const isDark = h.getAttribute('data-theme') === 'dark';
        h.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Load theme từ localStorage
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const icon = document.getElementById('themeIcon');
        if(icon) icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
    });
</script>
</body>
</html>
