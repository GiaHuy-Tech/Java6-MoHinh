<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - Model World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050b14;
            --bg-card: #0c1525;
            --text-light: #e1e7ff;
            --accent-cyan: #00f2ff;
            --accent-pink: #ff3864;
            --border-color: rgba(0, 242, 255, 0.2);
        }

        body { background: var(--bg-dark); color: var(--text-light); }

        .navbar {
            background-color: rgba(12, 21, 37, 0.95);
            border-bottom: 1px solid var(--border-color);
        }

        .filter-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border: 1px solid var(--accent-cyan);
            transform: translateY(-5px);
        }

        .product-img-box {
            height: 250px;
            overflow: hidden;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-price {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .btn-add-cart {
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            background: transparent;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
        }

        .btn-add-cart:hover {
            background: var(--accent-cyan);
            color: #000;
        }

        .btn-like {
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            padding: 8px;
            border-radius: 6px;
            text-decoration: none;
        }

        .product-unavailable {
            opacity: 0.6;
            pointer-events: none;
        }

        .badge-sold-out {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand text-white" href="/">MODEL WORLD</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-info" href="/products">Sản phẩm</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-warning" href="/cart">
                        <i class="bi bi-cart-fill"></i> Giỏ hàng
                    </a>
                </li>
            </ul>

            <form action="/products" method="get" class="d-flex ms-4">
                <input type="text" name="keyword" class="form-control me-2"
                       placeholder="Tìm kiếm..." th:value="${keyword}">

                <select class="form-select me-2" name="categoryId">
                    <option value="">Tất cả</option>
                    <option th:each="cate : ${categories}"
                            th:value="${cate.id}"
                            th:text="${cate.name}"
                            th:selected="${cate.id == selectedCategory}">
                    </option>
                </select>

                <button class="btn btn-outline-info">Tìm</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row">

        <!-- FILTER -->
        <div class="col-lg-3">
            <div class="filter-box">
                <form method="get" action="/products">
                    <input type="hidden" name="keyword" th:value="${keyword}">

                    <div class="mb-3">
                        <label>Danh mục</label>
                        <select name="categoryId" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.id}"
                                    th:text="${c.name}"
                                    th:selected="${c.id == selectedCategory}">
                            </option>
                        </select>
                    </div>

                    <button class="btn-add-cart w-100">Áp dụng</button>
                </form>
            </div>
        </div>

        <!-- PRODUCT LIST -->
        <div class="col-lg-9">
            <div class="row g-4">

                <div class="col-md-4" th:each="p : ${products}">
                    <div th:classappend="${!p.available} ? 'product-unavailable' : ''"
                         class="product-card position-relative">

                        <div th:if="${!p.available}" class="badge-sold-out">
                            HẾT HÀNG
                        </div>

                        <div class="product-img-box">
                            <img th:src="@{'/images/' + ${p.mainImage}}">
                        </div>

                        <div class="p-3">
                            <h6 th:text="${p.name}"></h6>

                            <div class="product-price"
                                 th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                            </div>

                            <div class="small text-light"
                                 th:text="${p.categoryName}">
                            </div>

                            <div class="mt-3 d-flex gap-2" th:if="${p.available}">

                                <!-- 🔥 FORM POST CHUẨN -->
                                <form th:action="@{'/cart/add/' + ${p.id}}"
                                      method="post"
                                      class="flex-fill">

                                    <button type="submit"
                                            class="btn-add-cart">
                                        Thêm giỏ
                                    </button>

                                </form>

                                <a th:href="@{'/wishlist/add/' + ${p.id}}"
                                   class="btn-like">
                                    <i class="bi bi-heart-fill"></i>
                                </a>

                            </div>

                            <button th:if="${!p.available}"
                                    class="btn-add-cart w-100"
                                    disabled>
                                Hết hàng
                            </button>

                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(products)}"
                     class="col-12 text-center">
                    Không tìm thấy sản phẩm nào.
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
