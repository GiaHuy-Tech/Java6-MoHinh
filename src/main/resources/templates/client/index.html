<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Model World</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
    background: #050b14;
    color: #e1e7ff;
}

.navbar {
    background: #0c1525;
}

.search-container {
    position: relative;
}

.search-suggestions {
    position: absolute;
    top: 110%;
    left: 0;
    right: 0;
    background: #0c1525;
    border: 1px solid #00f2ff;
    border-radius: 10px;
    display: none;
    z-index: 1000;
    max-height: 400px;
    overflow-y: auto;
}

.suggestion-item {
    display: flex;
    padding: 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.suggestion-item:hover {
    background: rgba(0,242,255,0.2);
}

.suggestion-item img {
    width: 45px;
    height: 45px;
    object-fit: cover;
    margin-right: 10px;
}

.product-card {
    background: #0c1525;
    border: 1px solid rgba(0,242,255,0.2);
    border-radius: 12px;
    padding: 15px;
    transition: 0.3s;
}

.product-card:hover {
    box-shadow: 0 0 15px #00f2ff;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand text-info fw-bold" href="/">MODEL WORLD</a>

<ul class="navbar-nav ms-auto align-items-center">

<!-- SEARCH -->
<li class="nav-item mx-3">
    <div class="search-container">
        <input type="text" id="liveSearchInput" class="form-control"
               placeholder="Tìm sản phẩm...">
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
</li>

<!-- LOGIN -->
<th:block th:if="${user != null}">
<li class="nav-item dropdown">
    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
        <i class="bi bi-person-circle fs-4"></i>
    </a>
    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
        <li><a class="dropdown-item" href="/account">Tài khoản</a></li>
        <li><a class="dropdown-item text-danger" href="/logout">Đăng xuất</a></li>
    </ul>
</li>
</th:block>

<th:block th:if="${user == null}">
<li class="nav-item">
    <a href="/login" class="nav-link text-info">Đăng nhập</a>
</li>
</th:block>

</ul>
</div>
</nav>

<!-- PRODUCTS -->
<div class="container mt-5">
<h3 class="mb-4 text-info">Sản phẩm mới nhất</h3>

<div class="row g-4">
<div class="col-md-3" th:each="p : ${latestProducts}">
    <div class="product-card text-center">
        <img th:src="${p.image}" class="img-fluid mb-3" style="height:180px;object-fit:cover;">
        <h6 th:text="${p.name}"></h6>
        <p class="text-info fw-bold"
           th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
        <a th:href="@{'/product-detail/' + ${p.id}}"
           class="btn btn-outline-info btn-sm">Xem chi tiết</a>
    </div>
</div>
</div>
</div>

<!-- SEARCH SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', function() {

    const input = document.getElementById('liveSearchInput');
    const box = document.getElementById('searchSuggestions');
    let timer;

    input.addEventListener('input', function() {

        clearTimeout(timer);
        const keyword = this.value.trim();

        if (keyword.length < 1) {
            box.style.display = "none";
            return;
        }

        timer = setTimeout(() => {

            fetch(`/api/products/search?keyword=${keyword}`)
                .then(res => res.json())
                .then(data => {

                    if (!data || data.length === 0) {
                        box.style.display = "none";
                        return;
                    }

                    let html = "";

                    data.forEach(p => {
                        html += `
                        <a href="/product-detail/${p.id}" class="suggestion-item">
                            <img src="${p.image}">
                            <div>
                                <div>${p.name}</div>
                                <small style="color:#00f2ff">
                                    ${new Intl.NumberFormat('vi-VN').format(p.price)} ₫
                                </small>
                            </div>
                        </a>
                        `;
                    });

                    box.innerHTML = html;
                    box.style.display = "block";
                });

        }, 300);
    });

    document.addEventListener('click', e => {
        if (!input.contains(e.target) && !box.contains(e.target)) {
            box.style.display = "none";
        }
    });

});
</script>

</body>
</html>
