<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công - MODEL WORLD</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0b0c10;
            --bg-card: #1f2833;
            --text-main: #66fcf1;
            --text-light: #c5c6c7;
            --accent-cyan: #45a29e;
            --border-color: #2d3238;
            --success-color: #20c997;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-light);
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-image: radial-gradient(circle at 50% 0%, rgba(69, 162, 158, 0.15) 0%, transparent 50%);
        }

        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(32, 201, 151, 0.1);
            max-width: 480px;
            width: 90%;
            padding: 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Hiệu ứng viền chạy trên card */
        .success-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--success-color), var(--text-main), var(--success-color));
            z-index: -1;
            border-radius: 22px;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            animation: gradientBorder 3s ease infinite;
        }
        
        .success-card:hover::before {
            opacity: 0.5;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hiệu ứng icon tick xanh */
        .icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
        }

        .icon-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: var(--success-color);
            opacity: 0.2;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .success-icon {
            font-size: 4.5rem;
            color: var(--success-color);
            line-height: 100px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }

        @keyframes popIn {
            100% { transform: scale(1); }
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .order-details {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .order-details p {
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }

        .order-details p:last-child { margin-bottom: 0; }

        .btn-custom {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-home {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-light);
        }

        .btn-home:hover {
            border-color: var(--text-main);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .btn-orders {
            background: var(--text-main);
            color: #0b0c10;
            border: 2px solid var(--text-main);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.2);
        }

        .btn-orders:hover {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 252, 241, 0.4);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <!-- Icon Check Animation -->
        <div class="icon-wrapper">
            <i class="bi bi-check-circle-fill success-icon"></i>
        </div>
        
        <h2 class="title">Giao dịch thành công</h2>
        <p class="text-secondary mb-0">Cảm ơn bạn đã mua sắm tại <strong>MODEL WORLD</strong>.</p>
        
        <!-- Order Details Box -->
        <div class="order-details" th:if="${orderId != null}">
            <p>
                <span class="text-secondary">Mã đơn hàng:</span>
                <strong class="text-white fs-5" th:text="'#DH' + ${orderId}"></strong>
            </p>
            <p>
                <span class="text-secondary">Phương thức:</span>
                <span class="badge bg-success px-3">VNPAY</span>
            </p>
            <hr class="border-secondary opacity-25 my-2">
            <p class="align-items-center mt-2">
                <span class="text-secondary">Tổng thanh toán:</span>
                <strong class="text-danger fs-4" th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + '₫'"></strong>
            </p>
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-4 mb-4">
            <a href="/" class="btn-custom btn-home flex-fill">
                <i class="bi bi-house-door"></i> TRANG CHỦ
            </a>
            <a href="/orders" class="btn-custom btn-orders flex-fill">
                <i class="bi bi-bag-check-fill"></i> ĐƠN HÀNG
            </a>
        </div>

        <p class="small text-secondary mb-0">
            Hệ thống sẽ tự động chuyển về trang đơn hàng sau <span id="countdown" class="text-main fw-bold fs-5 mx-1">10</span> giây...
        </p>
    </div>

    <script>
        // Script đếm ngược tự động chuyển trang
        let seconds = 10;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '/orders'; 
            }
        }, 1000);
    </script>

</body>
</html>
