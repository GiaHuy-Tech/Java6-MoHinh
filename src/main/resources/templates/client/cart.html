<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Model World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background:#050b14; color:#fff; font-family: sans-serif; }
        .table-container { background:#0c1525; border-radius:10px; padding:20px; }
        .price { color:#00f2ff; font-weight:700; }
        .btn-remove { border:1px solid red; color:red; padding:5px 10px; text-decoration:none; border-radius:5px; }
        .btn-remove:hover { background:red; color:white; }
        .btn-checkout { border:1px solid #00f2ff; color:#00f2ff; padding:8px 25px; text-decoration:none; border-radius:5px; }
        .btn-checkout:hover { background:#00f2ff; color:black; }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-4">GIỎ HÀNG CỦA BẠN</h2>

    <div class="table-container">

        <table class="table table-dark text-center align-middle">
            <thead>
                <tr>
                    <th style="width:40%">Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>

                <!-- Lặp sản phẩm -->
                <tr th:each="item : ${cartDetails}">

                    <td th:text="${item.product.name}"></td>

                    <td class="price"
                        th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + '₫'">
                    </td>

                    <!-- Tăng giảm -->
                    <td>
                        <a th:href="@{'/cart/minus/' + ${item.id}}"
                           class="btn btn-sm btn-outline-light">-</a>

                        <span class="mx-2" th:text="${item.quantity}"></span>

                        <a th:href="@{'/cart/plus/' + ${item.id}}"
                           class="btn btn-sm btn-outline-info">+</a>
                    </td>

                    <td class="price"
                        th:text="${#numbers.formatDecimal(item.product.price * item.quantity,0,'COMMA',0,'POINT')} + '₫'">
                    </td>

                    <td>
                        <a th:href="@{'/cart/delete/' + ${item.id}}"
                           class="btn-remove">
                            Xóa
                        </a>
                    </td>

                </tr>

                <!-- Nếu trống -->
                <tr th:if="${#lists.isEmpty(cartDetails)}">
                    <td colspan="5">
                        Giỏ hàng đang trống
                        <br><br>
                        <a href="/products" class="btn-checkout">
                            Mua ngay
                        </a>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

    <!-- Tổng tiền -->
    <div class="text-end mt-4"
         th:if="${!#lists.isEmpty(cartDetails)}">

        <h4>
            Tổng cộng:
            <span class="price"
                  th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + '₫'">
            </span>
        </h4>

        <a th:href="@{/checkout}" class="btn-checkout mt-3">
            Thanh toán
        </a>
    </div>

</div>

</body>
</html>
