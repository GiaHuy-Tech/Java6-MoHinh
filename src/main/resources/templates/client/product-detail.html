<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title th:text="${product.name} + ' - MODEL WORLD'">Chi tiết sản phẩm</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#0b0c10;
color:#c5c6c7;
font-family: 'Be Vietnam Pro', sans-serif;
}

.product-container{
background:#141b26;
border-radius:15px;
padding:40px;
}

.img-main-wrapper{
height:500px;
display:flex;
align-items:center;
justify-content:center;
background:#050505;
border-radius:10px;
}

.img-main-wrapper img{
max-height:100%;
object-fit:contain;
}

.thumbnail-gallery{
display:flex;
gap:10px;
margin-top:10px;
}

.thumbnail-item{
width:80px;
height:80px;
border-radius:8px;
cursor:pointer;
object-fit:cover;
border:2px solid #333;
}

.thumbnail-item.active{
border-color:#66fcf1;
}

.product-title{
font-size:2rem;
font-weight:700;
color:white;
}

.price-final{
font-size:2.3rem;
color:#66fcf1;
font-weight:700;
}

.comment-card{
background:#0b0c10;
border-radius:10px;
padding:20px;
border:1px solid #2d3238;
}

</style>
</head>

<body>

<div class="container py-5">

<!-- PRODUCT -->

<div class="product-container">

<div class="row g-5">

<!-- IMAGE -->
<div class="col-lg-5">

<div class="img-main-wrapper">

<img th:src="@{'/images/products/' + ${product.mainImage}}"
id="mainProductImg">

</div>

<div class="thumbnail-gallery"
th:if="${not #lists.isEmpty(extraImages)}">

<img th:src="@{'/images/products/' + ${product.mainImage}}"
class="thumbnail-item active"
onclick="changeMainImage(this)">

<img th:each="img : ${extraImages}"
th:src="@{'/images/products/' + ${img.image}}"
class="thumbnail-item"
onclick="changeMainImage(this)">

</div>

</div>

<!-- INFO -->
<div class="col-lg-7">

<h1 class="product-title"
th:text="${product.name}"></h1>

<p class="price-final"
th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' ₫'"></p>

<p th:text="${product.description}"></p>

<form th:action="@{/cart/add}" method="post">

<input type="hidden"
name="productId"
th:value="${product.id}">

<div class="d-flex gap-3">

<input type="number"
name="quantity"
value="1"
min="1"
class="form-control"
style="width:120px">

<button class="btn btn-info">

<i class="bi bi-cart-plus"></i>
Thêm vào giỏ

</button>

</div>

</form>

</div>

</div>

</div>

<!-- COMMENT -->

<div class="mt-5">

<h4 class="mb-4">Đánh giá sản phẩm</h4>

<!-- FORM COMMENT -->

<div th:if="${canComment}" class="mb-5">

<form th:action="@{'/product-detail/comment/' + ${product.id}}"
method="post"
enctype="multipart/form-data">

<div class="row g-3">

<div class="col-md-4">

<select name="rating" class="form-select">

<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>

</select>

</div>

<div class="col-md-8">

<input type="file"
name="imageFile"
class="form-control">

</div>

<div class="col-12">

<textarea name="content"
class="form-control"
rows="4"
placeholder="Viết đánh giá..."
required></textarea>

</div>

<div class="col-12 text-end">

<button class="btn btn-success">
Gửi đánh giá
</button>

</div>

</div>

</form>

</div>

<!-- COMMENT LIST -->

<div>

<div th:if="${#lists.isEmpty(comments)}"
class="text-center text-secondary">

Chưa có đánh giá nào

</div>


<div th:each="cmt : ${comments}"
class="comment-card mb-3 d-flex gap-3">

<img th:src="${cmt.account.avatar != null ? '/images/avatar/' + cmt.account.avatar : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
style="width:55px;height:55px;object-fit:cover"
class="rounded-circle">

<div class="w-100">

<div class="d-flex justify-content-between">

<b th:text="${cmt.account.fullName}"></b>

<span th:text="${#temporals.format(cmt.createdAt,'dd/MM/yyyy HH:mm')}"></span>

</div>

<div class="text-warning">

<i class="bi bi-star-fill"
th:each="i : ${#numbers.sequence(1,cmt.rating)}"></i>

</div>

<p th:text="${cmt.content}"></p>

<div th:if="${cmt.image != null}">

<img th:src="@{'/uploads/comments/' + ${cmt.image}}"
style="max-height:120px"
class="rounded">

</div>

</div>

</div>

</div>

</div>

</div>


<script>

function changeMainImage(element){

document.getElementById("mainProductImg").src = element.src;

let thumbs = document.getElementsByClassName("thumbnail-item");

for(let i=0;i<thumbs.length;i++){
thumbs[i].classList.remove("active");
}

element.classList.add("active");

}

</script>

</body>
</html>
