<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - MODEL WORLD'">Chi tiết sản phẩm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0b0c10; --bg-card: #141b26; --text-main: #66fcf1;
            --text-light: #c5c6c7; --text-dim: #999999; --accent-cyan: #45a29e;
        }
        
        body {
            background: var(--bg-body);
            color: var(--text-light);
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .product-container {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid #1f2833;
        }

        .img-main-wrapper {
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3238;
        }

        .img-main-wrapper img {
            max-height: 90%;
            object-fit: contain;
            transition: 0.3s;
        }

        .thumbnail-gallery {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .thumbnail-item {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid #333;
            transition: 0.2s;
        }

        .thumbnail-item.active { border-color: var(--text-main); }
        .thumbnail-item:hover { border-color: var(--accent-cyan); }

        .product-title {
            font-family: 'Montserrat';
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
        }

        .price-final {
            font-size: 2.5rem;
            color: var(--text-main);
            font-weight: 800;
            margin: 20px 0;
        }

        /* COMMENT SECTION */
        .comment-header {
            border-left: 5px solid var(--text-main);
            padding-left: 15px;
            margin-bottom: 30px;
            font-family: 'Montserrat';
            font-weight: 700;
        }

        .comment-card {
            background: #1f2833;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2d3238;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .comment-card:hover { border-color: var(--accent-cyan); }
        
        .user-avatar {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--text-main);
        }

        .rating-stars { color: #ffcc00; font-size: 0.9rem; }
        .comment-img {
            max-height: 150px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #444;
            cursor: zoom-in;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="product-container shadow-lg">
        <div class="row g-5">
            <div class="col-lg-5">
                <div class="img-main-wrapper">
                    <img th:src="@{'/images/products/' + ${product.mainImage}}" id="mainProductImg" alt="Product Image">
                </div>

                <div class="thumbnail-gallery" th:if="${not #lists.isEmpty(extraImages)}">
                    <img th:src="@{'/images/products/' + ${product.mainImage}}" 
                         class="thumbnail-item active" onclick="changeMainImage(this)">
                    
                    <img th:each="img : ${extraImages}" 
                         th:src="@{'/images/products/' + ${img.image}}" 
                         class="thumbnail-item" onclick="changeMainImage(this)">
                </div>
            </div>

            <div class="col-lg-7">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/" class="text-info text-decoration-none">Trang chủ</a></li>
                        <li class="breadcrumb-item"><a href="/products" class="text-info text-decoration-none">Sản phẩm</a></li>
                        <li class="breadcrumb-item active text-secondary" aria-current="page">Chi tiết</li>
                    </ol>
                </nav>

                <h1 class="product-title" th:text="${product.name}"></h1>
                
                <div class="price-final" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' ₫'"></div>
                
                <div class="mb-4">
                    <h6 class="text-white fw-bold">Mô tả sản phẩm:</h6>
                    <p class="text-secondary" th:text="${product.description}" style="line-height: 1.8;"></p>
                </div>

                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <div class="d-flex align-items-center gap-3">
                        <div class="input-group" style="width: 140px;">
                            <span class="input-group-text bg-dark border-secondary text-white">SL</span>
                            <input type="number" name="quantity" value="1" min="1" class="form-control bg-dark text-white border-secondary text-center">
                        </div>
                        <button class="btn btn-info px-4 py-2 fw-bold text-uppercase">
                            <i class="bi bi-cart-plus-fill me-2"></i>Thêm vào giỏ hàng
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <h3 class="comment-header text-uppercase">Khách hàng đánh giá</h3>

        <div th:if="${#lists.isEmpty(comments)}" class="text-center py-5 comment-card opacity-50">
            <i class="bi bi-chat-left-dots" style="font-size: 3rem;"></i>
            <p class="mt-3">Sản phẩm này chưa có đánh giá nào từ người mua.</p>
        </div>

        <div th:each="cmt : ${comments}" class="comment-card d-flex gap-4">
            <img th:src="${cmt.account.avatar != null ? '/images/avatar/' + cmt.account.avatar : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                 class="user-avatar shadow-sm">

            <div class="w-100">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <b class="text-white fs-5" th:text="${cmt.account.fullName}"></b>
                    <span class="text-dim small">
                        <i class="bi bi-clock me-1"></i>
                        <span th:text="${#temporals.format(cmt.createdAt,'dd/MM/yyyy HH:mm')}"></span>
                    </span>
                </div>

                <div class="rating-stars mb-2">
                    <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, cmt.rating)}"></i>
                    <i class="bi bi-star text-secondary" th:if="${cmt.rating < 5}" th:each="i : ${#numbers.sequence(cmt.rating + 1, 5)}"></i>
                </div>

                <p class="mb-3 text-light" th:text="${cmt.content}"></p>

                <div th:if="${cmt.image != null}">
                    <img th:src="@{'/uploads/comments/' + ${cmt.image}}" class="comment-img" alt="Review Photo">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function changeMainImage(element){
        document.getElementById("mainProductImg").src = element.src;
        let thumbs = document.getElementsByClassName("thumbnail-item");
        for(let i=0; i<thumbs.length; i++){
            thumbs[i].classList.remove("active");
        }
        element.classList.add("active");
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
